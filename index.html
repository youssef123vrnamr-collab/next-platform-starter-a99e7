<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astronomi | الذكاء المخفي</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #0a0f1e, #0c1222);
            font-family: 'Segoe UI', system-ui;
            color: white;
            padding: 2rem;
            min-height: 100vh;
        }
        .container { max-width: 1000px; margin: auto; }
        header { text-align: center; margin-bottom: 2rem; }
        h1 { background: linear-gradient(135deg, #FFD966, #FFA559); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .model-bar { display: flex; justify-content: center; gap: 1rem; margin-bottom: 2rem; }
        .model-btn { background: #1e2538; border: none; padding: 0.5rem 1.5rem; border-radius: 40px; cursor: pointer; color: white; font-weight: bold; transition: 0.2s; }
        .model-btn.active { background: #3b4b7a; box-shadow: 0 0 10px #5f8ed6; }
        .card { background: #121826aa; backdrop-filter: blur(8px); border-radius: 2rem; padding: 1.5rem; margin-bottom: 1.5rem; }
        textarea { width: 100%; background: #0c1222; border: 1px solid #2f4172; border-radius: 1rem; padding: 0.8rem; color: white; font-size: 1rem; resize: vertical; }
        button { background: #2a3b5e; border: none; padding: 0.5rem 1.2rem; border-radius: 2rem; color: white; font-weight: bold; cursor: pointer; margin-top: 0.5rem; }
        .response { background: #070b14; border-radius: 1rem; padding: 1rem; margin-top: 1rem; }
        img, video { max-width: 100%; border-radius: 1rem; margin-top: 1rem; }
        .rating { display: flex; gap: 1rem; justify-content: center; margin-top: 1rem; }
        footer { text-align: center; font-size: 0.7rem; margin-top: 2rem; color: #6b7c9e; }
    </style>
</head>
<body>
<div class="container">
    <header><h1>🧠 Astronomi · العقل المخفي</h1><p>المعادلة الرياضية تعيش فقط في الخادم</p></header>
    <div class="model-bar">
        <button data-model="alpha" class="model-btn active">Alpha</button>
        <button data-model="beta" class="model-btn">Beta</button>
        <button data-model="gamma" class="model-btn">Gamma</button>
    </div>
    <div class="card">
        <textarea id="promptInput" rows="3" placeholder="اكثر أمراً... مثل: ارسم غروب شمس، فيديو عن الفضاء، كود بلغة C، أو أي سؤال"></textarea>
        <button id="sendBtn">إرسال ✨</button>
        <div class="response" id="responseArea">سيرد العقل هنا...</div>
        <div class="rating" id="ratingDiv" style="display: none;">
            <button id="goodBtn" style="background:#2a5a3e;">👍 مفيد (يدرب العقل)</button>
            <button id="badBtn" style="background:#6e3a2e;">👎 غير مفيد (يدرب العقل)</button>
        </div>
    </div>
    <footer>⚡ العقل الرياضي على الخادم يتعلم من تقييماتك | المعادلة لا تظهر في المتصفح أبداً</footer>
</div>

<script>
    let currentModel = 'alpha';
    let lastResponseType = '';

    // تبديل النموذج
    document.querySelectorAll('.model-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.model-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentModel = btn.dataset.model;
            document.getElementById('responseArea').innerHTML = `🔄 تم التبديل إلى نموذج ${currentModel.toUpperCase()}`;
            document.getElementById('ratingDiv').style.display = 'none';
        });
    });

    // إرسال الأمر للخادم
    document.getElementById('sendBtn').onclick = async () => {
        const prompt = document.getElementById('promptInput').value.trim();
        if (!prompt) return;
        document.getElementById('responseArea').innerHTML = '⏳ جاري الاتصال بالخادم...';
        document.getElementById('ratingDiv').style.display = 'none';
        
        try {
            const res = await fetch('/api/process', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt, model: currentModel })
            });
            const data = await res.json();
            let html = `<strong>📢 الرد:</strong><br>${data.message || ''}<br>`;
            if (data.type === 'image' && data.url) {
                html += `<img src="${data.url}" alt="الصورة المولدة">`;
            } else if (data.type === 'video' && data.url) {
                html += `<video controls src="${data.url}" style="max-width:100%"></video>`;
            } else if (data.type === 'code') {
                html += `<pre style="background:#0a0c14; padding:10px; border-radius:12px; overflow-x:auto;">${data.content}</pre>`;
            } else {
                html += `<div style="white-space:pre-wrap;">${data.content || ''}</div>`;
            }
            document.getElementById('responseArea').innerHTML = html;
            document.getElementById('ratingDiv').style.display = 'flex';
        } catch(err) {
            document.getElementById('responseArea').innerHTML = `❌ خطأ: ${err.message}`;
        }
    };

    // إرسال التقييم لتدريب العقل في الخادم
    async function sendRating(isPositive) {
        try {
            await fetch('/api/train', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ model: currentModel, isPositive })
            });
            document.getElementById('responseArea').innerHTML += `<br>🧠 تم تدريب العقل (${isPositive ? 'تقييم إيجابي' : 'تقييم سلبي'}) - المعادلة تطورت في الخادم.`;
        } catch(e) { console.error(e); }
    }

    document.getElementById('goodBtn').onclick = () => sendRating(true);
    document.getElementById('badBtn').onclick = () => sendRating(false);
</script>
</body>
</html>
