<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>المصحف الملكي ✦ تلاوة وتأمل</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Noto+Naskh+Arabic:wght@400;500;600;700&family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
  --gold: #c9975a;
  --gold-light: #f0d195;
  --gold-deep: #8b6020;
  --parchment: #faf6ec;
  --parchment-dark: #f0e8d0;
  --ink: #2a2010;
  --green: #1e5c3a;
  --green-light: #2d7a50;
  --border: #d4a855;
  --shadow: rgba(100,60,0,0.18);
  --bg: #b8893c;
  --page-bg: #fffef5;
  --text: #1e1a0e;
  --surah-color: #6b4510;
  --fade: #e8d9b8;
  --ctrl-bg: #fdf5e3;
  --ctrl-border: #d4a84a;
  --status: #9c6020;
  --ornament: #c9975a;
  --scroll-thumb: #c9975a;
  --highlight: rgba(255,220,80,0.45);
  --highlight-border: #d4a030;
  --btn-play: #1a5c38;
  --btn-stop: #8b2a10;
  --transition: 0.3s cubic-bezier(.4,0,.2,1);
}

body.dark {
  --gold: #e0b86a;
  --gold-light: #f5d890;
  --gold-deep: #c09040;
  --parchment: #1a2218;
  --parchment-dark: #1e2a1c;
  --ink: #f5ead0;
  --green: #2a7a4e;
  --green-light: #3a9060;
  --border: #b08030;
  --shadow: rgba(0,0,0,0.5);
  --bg: #111a0e;
  --page-bg: #1c2519;
  --text: #f0e6c8;
  --surah-color: #e0c070;
  --fade: #2a3828;
  --ctrl-bg: #1e2a1c;
  --ctrl-border: #8a6820;
  --status: #e0a040;
  --ornament: #e0b86a;
  --scroll-thumb: #a08030;
  --highlight: rgba(180,130,0,0.4);
  --highlight-border: #c09030;
  --btn-play: #1a5c38;
  --btn-stop: #7a2010;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html { scroll-behavior: smooth; }

body {
  min-height: 100vh;
  background: var(--bg);
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 1rem;
  font-family: 'Tajawal', sans-serif;
  transition: background var(--transition), color var(--transition);
  background-image: 
    radial-gradient(ellipse at 20% 20%, rgba(255,200,80,0.13) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 80%, rgba(100,60,0,0.15) 0%, transparent 60%);
}

/* ===== LOADING SCREEN ===== */
#loadingScreen {
  position: fixed;
  inset: 0;
  background: #0d1209;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  transition: opacity 0.8s, visibility 0.8s;
}
#loadingScreen.hidden { opacity:0; visibility:hidden; pointer-events:none; }
.loading-basmala {
  font-family: 'Amiri Quran', serif;
  font-size: 2.2rem;
  color: #e0b86a;
  text-align: center;
  animation: pulseGlow 2s infinite;
  margin-bottom: 1.5rem;
}
.loading-bar-wrap {
  width: 220px;
  height: 4px;
  background: rgba(255,200,80,0.15);
  border-radius: 99px;
  overflow: hidden;
}
.loading-bar {
  height: 100%;
  background: linear-gradient(90deg, #e0b86a, #ffe090, #e0b86a);
  border-radius: 99px;
  animation: loadBar 1.8s ease-in-out infinite;
}
@keyframes loadBar {
  0% { width: 0; }
  80% { width: 100%; }
  100% { width: 100%; opacity:0; }
}
@keyframes pulseGlow {
  0%,100% { opacity:0.7; text-shadow: 0 0 10px rgba(224,184,106,0.4); }
  50% { opacity:1; text-shadow: 0 0 30px rgba(224,184,106,0.9), 0 0 60px rgba(224,184,106,0.3); }
}

/* ===== MAIN CONTAINER ===== */
.mushaf {
  width: 100%;
  max-width: 1100px;
  margin: 0 auto;
  animation: fadeInUp 0.8s ease both;
}
@keyframes fadeInUp {
  from { opacity:0; transform:translateY(30px); }
  to { opacity:1; transform:translateY(0); }
}

/* ===== HEADER ===== */
.mushaf-header {
  text-align: center;
  margin-bottom: 0.7rem;
  position: relative;
}
.mushaf-title {
  font-family: 'Noto Naskh Arabic', serif;
  font-size: 1.3rem;
  color: var(--gold-light);
  letter-spacing: 3px;
  text-shadow: 0 2px 10px rgba(200,150,40,0.5);
  font-weight: 700;
}
.title-ornament {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.6rem;
  color: var(--gold);
  font-size: 0.75rem;
  margin-top: 0.2rem;
  opacity: 0.8;
}

/* ===== BOOK FRAME ===== */
.book-frame {
  background: var(--parchment-dark);
  border-radius: 20px;
  border: 5px double var(--border);
  box-shadow: 
    0 20px 60px var(--shadow),
    0 0 0 1px rgba(212,168,85,0.3),
    inset 0 0 30px rgba(212,168,85,0.08);
  padding: 0.5rem;
  transition: background var(--transition), border-color var(--transition);
  position: relative;
  overflow: hidden;
}
.book-frame::before {
  content: '';
  position: absolute;
  top: 0; left: 50%;
  transform: translateX(-50%);
  width: 4px;
  height: 100%;
  background: linear-gradient(to bottom, var(--border), transparent);
  opacity: 0.3;
  pointer-events: none;
}

/* ===== CONTROL BAR ===== */
.ctrl-bar {
  background: var(--ctrl-bg);
  border: 1px solid var(--ctrl-border);
  border-radius: 50px;
  padding: 0.35rem 0.8rem;
  display: flex;
  flex-wrap: wrap;
  gap: 0.35rem;
  justify-content: center;
  align-items: center;
  margin-bottom: 0.5rem;
  transition: background var(--transition);
}

.btn, select.ctrl-sel {
  background: var(--ctrl-bg);
  border: 1px solid var(--ctrl-border);
  color: var(--surah-color);
  border-radius: 30px;
  padding: 0.22rem 0.75rem;
  font-size: 0.72rem;
  font-weight: 600;
  font-family: 'Tajawal', sans-serif;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  transition: all 0.2s;
  outline: none;
  white-space: nowrap;
}
.btn:hover { background: var(--fade); transform: translateY(-1px); box-shadow: 0 3px 10px var(--shadow); }
.btn.active { background: var(--gold); color: #fff; border-color: var(--gold-deep); }
.btn.green { background: var(--btn-play); color: #fff; border-color: #0d3d24; }
.btn.green:hover { background: var(--green-light); }
.btn.red { background: var(--btn-stop); color: #fff; border-color: #5a1a08; }
.btn.red:hover { background: #a03215; }
.btn.icon-only { padding: 0.22rem 0.55rem; }

select.ctrl-sel { appearance: none; -webkit-appearance: none; padding-left: 0.5rem; }
option { background: var(--page-bg); color: var(--text); }

/* ===== SPEED BTNS ===== */
.speed-wrap {
  background: var(--fade);
  border-radius: 50px;
  padding: 0.1rem 0.3rem;
  display: flex;
  gap: 1px;
}
.speed-btn {
  background: transparent;
  border: none;
  color: var(--surah-color);
  border-radius: 50px;
  padding: 0.18rem 0.55rem;
  font-size: 0.68rem;
  font-weight: 700;
  font-family: 'Tajawal', sans-serif;
  cursor: pointer;
  transition: all 0.15s;
}
.speed-btn:hover, .speed-btn.on { background: var(--gold); color: #fff; }

/* ===== PROGRESS BAR ===== */
.progress-wrap {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.3rem 0.8rem;
  margin-bottom: 0.4rem;
}
.progress-label { font-size: 0.65rem; color: var(--status); font-weight: 600; min-width: 40px; text-align: center; font-family: 'Tajawal'; }
.progress-bar-outer {
  flex: 1;
  height: 6px;
  background: var(--fade);
  border-radius: 99px;
  overflow: hidden;
  cursor: pointer;
  position: relative;
}
.progress-bar-inner {
  height: 100%;
  background: linear-gradient(90deg, var(--gold-deep), var(--gold), var(--gold-light));
  border-radius: 99px;
  width: 0%;
  transition: width 0.4s ease;
  position: relative;
}
.progress-bar-inner::after {
  content: '';
  position: absolute;
  right: 0; top: 50%;
  transform: translateY(-50%);
  width: 12px; height: 12px;
  background: var(--gold);
  border-radius: 50%;
  border: 2px solid #fff;
  box-shadow: 0 0 6px rgba(200,150,40,0.6);
}

/* ===== STATUS ===== */
.status-bar {
  text-align: center;
  font-size: 0.7rem;
  color: var(--status);
  min-height: 1.1rem;
  margin-bottom: 0.3rem;
  font-weight: 500;
  transition: opacity 0.3s;
}

/* ===== PAGE ===== */
.page {
  background: var(--page-bg);
  border-radius: 14px;
  padding: 1rem 1.5rem 0.8rem;
  transition: background var(--transition);
  position: relative;
}

/* ===== SURAH HEAD ===== */
.surah-head {
  text-align: center;
  margin-bottom: 0.8rem;
  border-bottom: 2px solid var(--border);
  padding-bottom: 0.5rem;
  position: relative;
}
.surah-name {
  font-family: 'Amiri Quran', serif;
  font-size: 2rem;
  font-weight: 800;
  color: var(--surah-color);
  transition: color var(--transition);
}
.surah-info {
  font-size: 0.72rem;
  color: var(--gold-deep);
  margin-top: 0.2rem;
  font-weight: 600;
  display: flex;
  justify-content: center;
  gap: 1rem;
  opacity: 0.8;
}
.surah-info span { display: inline-flex; align-items: center; gap: 3px; }

/* ===== BASMALA ===== */
.basmala-wrap {
  text-align: center;
  padding: 0.6rem 0;
  margin-bottom: 0.5rem;
  position: relative;
}
.basmala-text {
  font-family: 'Amiri Quran', serif;
  font-size: 2rem;
  color: var(--surah-color);
  display: inline-block;
  letter-spacing: 1px;
  transition: color var(--transition), font-size var(--transition);
}
.basmala-deco {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
  color: var(--ornament);
  font-size: 0.7rem;
  opacity: 0.5;
  margin-top: 0.3rem;
}

/* ===== QURAN CONTENT ===== */
.quran-scroll {
  max-height: 62vh;
  overflow-y: auto;
  padding: 0.3rem 0.2rem;
  scroll-behavior: smooth;
}
.quran-scroll::-webkit-scrollbar { width: 5px; }
.quran-scroll::-webkit-scrollbar-track { background: var(--fade); border-radius: 99px; }
.quran-scroll::-webkit-scrollbar-thumb { background: var(--scroll-thumb); border-radius: 99px; }

/* ===== AYAH ===== */
.aya {
  display: block;
  padding: 0.5rem 0.6rem;
  border-radius: 12px;
  margin-bottom: 0.25rem;
  transition: background 0.25s, box-shadow 0.25s;
  cursor: default;
  position: relative;
}
.aya:hover { background: rgba(212,168,85,0.08); }
.aya.active {
  background: var(--highlight);
  border: 1px solid var(--highlight-border);
  box-shadow: 0 2px 12px rgba(200,150,30,0.2);
  animation: ayahPop 0.3s ease;
}
@keyframes ayahPop {
  0% { transform: scale(0.99); }
  60% { transform: scale(1.005); }
  100% { transform: scale(1); }
}

.ayah-body {
  display: flex;
  flex-wrap: wrap;
  gap: 0.3rem;
  justify-content: flex-end;
  align-items: baseline;
  direction: rtl;
}
.word {
  font-family: 'Amiri Quran', serif;
  font-size: 1.6rem;
  line-height: 2.2rem;
  font-weight: 500;
  color: var(--text);
  display: inline-block;
  border-radius: 4px;
  padding: 0 2px;
  transition: color var(--transition), font-size var(--transition);
  cursor: pointer;
}
.word:hover { color: var(--gold-deep); }

.aya-num {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 28px;
  height: 28px;
  background: var(--gold);
  color: #fff;
  border-radius: 50%;
  font-size: 0.65rem;
  font-weight: 800;
  font-family: 'Tajawal', sans-serif;
  margin-right: 0.3rem;
  flex-shrink: 0;
  box-shadow: 0 1px 4px rgba(100,60,0,0.2);
  transition: background var(--transition);
  vertical-align: middle;
}
.aya.active .aya-num { background: var(--gold-deep); animation: numPulse 1.5s infinite; }
@keyframes numPulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(200,150,30,0.4); }
  50% { box-shadow: 0 0 0 6px rgba(200,150,30,0); }
}

/* ===== BOOKMARK ===== */
.bookmark-star {
  position: absolute;
  left: 0.4rem;
  top: 50%;
  transform: translateY(-50%);
  font-size: 0.8rem;
  color: var(--gold);
  opacity: 0;
  transition: opacity 0.2s;
  cursor: pointer;
}
.aya:hover .bookmark-star, .aya.bookmarked .bookmark-star { opacity: 1; }
.aya.bookmarked .bookmark-star { color: #e08030; }

/* ===== TOOLTIP ===== */
.word-tooltip {
  position: fixed;
  background: #1a1208;
  color: #f0dda0;
  border: 1px solid var(--gold);
  border-radius: 10px;
  padding: 0.35rem 0.7rem;
  font-family: 'Tajawal', sans-serif;
  font-size: 0.72rem;
  z-index: 100;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.2s;
  max-width: 220px;
  text-align: center;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}
.word-tooltip.show { opacity: 1; }

/* ===== SEARCH PANEL ===== */
.search-panel {
  background: var(--ctrl-bg);
  border: 1px solid var(--ctrl-border);
  border-radius: 14px;
  padding: 0.5rem 0.8rem;
  margin-bottom: 0.5rem;
  display: none;
  gap: 0.4rem;
  align-items: center;
  animation: slideDown 0.3s ease;
}
.search-panel.show { display: flex; }
@keyframes slideDown {
  from { opacity:0; transform:translateY(-8px); }
  to { opacity:1; transform:translateY(0); }
}
.search-input {
  flex: 1;
  background: var(--page-bg);
  border: 1px solid var(--ctrl-border);
  border-radius: 30px;
  padding: 0.25rem 0.8rem;
  font-family: 'Amiri Quran', serif;
  font-size: 1.1rem;
  color: var(--text);
  outline: none;
  direction: rtl;
}
.search-count { font-size: 0.68rem; color: var(--status); font-weight: 600; min-width: 50px; text-align: center; }
.search-highlight { background: rgba(255,200,50,0.5); border-radius: 3px; }
.search-current { background: rgba(255,140,20,0.6); border-radius: 3px; }

/* ===== BOOKMARKS PANEL ===== */
.bookmarks-panel {
  background: var(--ctrl-bg);
  border: 1px solid var(--ctrl-border);
  border-radius: 14px;
  padding: 0.6rem 0.8rem;
  margin-bottom: 0.5rem;
  display: none;
  flex-direction: column;
  gap: 0.3rem;
  max-height: 160px;
  overflow-y: auto;
  animation: slideDown 0.3s ease;
}
.bookmarks-panel.show { display: flex; }
.bookmark-item {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  padding: 0.3rem 0.5rem;
  border-radius: 8px;
  background: var(--page-bg);
  border: 1px solid var(--fade);
  cursor: pointer;
  font-size: 0.72rem;
  color: var(--text);
  transition: background 0.15s;
}
.bookmark-item:hover { background: var(--fade); }
.bookmark-item .bi-num { background: var(--gold); color: #fff; border-radius: 50%; width: 22px; height: 22px; display: inline-flex; align-items: center; justify-content: center; font-size: 0.62rem; font-weight: 800; flex-shrink: 0; }
.bookmark-item .bi-text { flex: 1; font-family: 'Amiri Quran', serif; font-size: 0.9rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.bookmark-item .bi-del { color: #c04030; cursor: pointer; opacity: 0.6; transition: opacity 0.15s; }
.bookmark-item .bi-del:hover { opacity: 1; }

/* ===== TAFSEER MODAL ===== */
.modal-bg {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 500;
  display: none;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(4px);
  animation: fadeInBg 0.25s ease;
}
.modal-bg.open { display: flex; }
@keyframes fadeInBg { from { opacity:0; } to { opacity:1; } }
.modal-box {
  background: var(--page-bg);
  border: 2px solid var(--border);
  border-radius: 18px;
  padding: 1.2rem;
  max-width: 520px;
  width: 90%;
  max-height: 80vh;
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  animation: modalPop 0.3s cubic-bezier(.4,0,.2,1);
  direction: rtl;
}
@keyframes modalPop {
  from { opacity:0; transform: scale(0.92) translateY(20px); }
  to { opacity:1; transform: scale(1) translateY(0); }
}
.modal-title { font-size: 1rem; font-weight: 800; color: var(--surah-color); margin-bottom: 0.6rem; display: flex; justify-content: space-between; align-items: center; font-family: 'Tajawal'; }
.modal-close { cursor: pointer; color: var(--status); font-size: 1.1rem; transition: color 0.15s; }
.modal-close:hover { color: #c04030; }
.modal-ayah-text { font-family: 'Amiri Quran', serif; font-size: 1.5rem; color: var(--surah-color); margin-bottom: 0.8rem; line-height: 2.2rem; border-bottom: 1px solid var(--border); padding-bottom: 0.6rem; }
.modal-content { font-size: 0.85rem; color: var(--text); line-height: 1.8; font-family: 'Tajawal'; }
.modal-loading { text-align: center; color: var(--status); padding: 1rem; font-size: 0.85rem; }

/* ===== SETTINGS PANEL ===== */
.settings-panel {
  background: var(--ctrl-bg);
  border: 1px solid var(--ctrl-border);
  border-radius: 14px;
  padding: 0.6rem 0.8rem;
  margin-bottom: 0.5rem;
  display: none;
  flex-wrap: wrap;
  gap: 0.4rem;
  align-items: center;
  justify-content: center;
  animation: slideDown 0.3s ease;
}
.settings-panel.show { display: flex; }
.setting-item { display: flex; align-items: center; gap: 0.3rem; font-size: 0.72rem; color: var(--text); font-weight: 600; }
.toggle-switch {
  width: 36px;
  height: 18px;
  background: var(--fade);
  border-radius: 99px;
  position: relative;
  cursor: pointer;
  border: 1px solid var(--ctrl-border);
  transition: background 0.2s;
}
.toggle-switch.on { background: var(--gold); border-color: var(--gold-deep); }
.toggle-switch::after {
  content: '';
  position: absolute;
  width: 14px; height: 14px;
  background: #fff;
  border-radius: 50%;
  top: 1px; right: 1px;
  transition: transform 0.2s;
  box-shadow: 0 1px 4px rgba(0,0,0,0.3);
}
.toggle-switch.on::after { transform: translateX(-18px); }

/* ===== FOOTER ===== */
.mushaf-footer {
  text-align: center;
  font-size: 0.6rem;
  color: var(--gold);
  margin-top: 0.8rem;
  border-top: 1px solid var(--border);
  padding-top: 0.4rem;
  opacity: 0.8;
}

/* ===== TASBIH COUNTER (floating) ===== */
.tasbih-btn {
  position: fixed;
  bottom: 1.5rem;
  left: 1.5rem;
  z-index: 200;
  background: var(--gold);
  color: #fff;
  border: none;
  border-radius: 50%;
  width: 50px;
  height: 50px;
  font-size: 1.2rem;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(150,90,0,0.4);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  font-family: 'Tajawal';
  font-weight: 800;
  line-height: 1;
}
.tasbih-btn:hover { transform: scale(1.1); box-shadow: 0 6px 25px rgba(150,90,0,0.5); }
.tasbih-btn:active { transform: scale(0.95); }
.tasbih-label { font-size: 0.55rem; font-weight: 700; margin-top: 1px; }

/* ===== RECITER BADGE ===== */
.reciter-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: var(--fade);
  border: 1px solid var(--ctrl-border);
  border-radius: 30px;
  padding: 0.15rem 0.6rem;
  font-size: 0.65rem;
  color: var(--surah-color);
  font-weight: 600;
}

/* ===== ANIMATIONS ===== */
.ornament-row {
  display: flex;
  justify-content: center;
  gap: 0.4rem;
  color: var(--ornament);
  font-size: 0.7rem;
  margin: 0.2rem 0;
  opacity: 0.7;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 700px) {
  body { padding: 0.4rem; }
  .word { font-size: 1.3rem; line-height: 1.9rem; }
  .surah-name { font-size: 1.6rem; }
  .basmala-text { font-size: 1.6rem; }
  .quran-scroll { max-height: 58vh; }
  .page { padding: 0.7rem 0.8rem; }
  .mushaf-title { font-size: 1.1rem; }

</style>
</head>

        <option value="Maher_AlMuaiqly_128kbps">🎙️ ماهر المعيقلي</option>

<script>
/* ══════════════════════════ STATE ══════════════════════════ */
const S = {
  surahId: 1,
  surahData: null,
  ayahs: [],
  surahList: [],
  surahCache: new Map(),
  
  isPlaying: false,
  isPaused: false,
  audioIndex: 0,
  audioQueue: [],
  audioEl: null,
  playbackRate: 1,
  reciter: 'Alafasy_128kbps',
  
  fontSize: 1.6,
  fontFamily: "'Amiri Quran', serif",
  isDark: false,
  autoScroll: true,
  autoPlay: true,
  repeatAyah: false,
  repeatCount: 1,
  repeatCurrent: 0,
  
  bookmarks: [],
  tasbihCount: 0,
  
  searchResults: [],
  searchIndex: 0,
  searchActive: false,
  
  showBookmarks: false,
  showSearch: false,
  showSettings: false,
};

/* ══════════════════════════ DOM ══════════════════════════ */
const $ = id => document.getElementById(id);
const surahSel = $('surahSel');
const reciterSel = $('reciterSel');
const surahName = $('surahName');
const surahInfo = $('surahInfo');
const infoAyahs = $('infoAyahs');
const infoType = $('infoType');
const infoPage = $('infoPage');
const quranContent = $('quranContent');
const statusBar = $('statusBar');
const progressFill = $('progressFill');
const progressLabel = $('progressLabel');
const progressBar = $('progressBar');
const playBtn = $('playBtn');
const pauseBtn = $('pauseBtn');
const stopBtn = $('stopBtn');
const searchPanel = $('searchPanel');
const searchInput = $('searchInput');
const searchCount = $('searchCount');
const bookmarksPanel = $('bookmarksPanel');
const bookmarksList = $('bookmarksList');
const settingsPanel = $('settingsPanel');
const tooltip = $('tooltip');
const tasbihBtn = $('tasbihBtn');
const tasbihCount = $('tasbihCount');

/* ══════════════════════════ HELPERS ══════════════════════════ */
function setStatus(msg) { statusBar.innerHTML = msg; }

function toArabicNum(n) {
  return String(n).replace(/\d/g, d => '٠١٢٣٤٥٦٧٨٩'[d]);
}

function saveState() {
  localStorage.setItem('mq_surah', S.surahId);
  localStorage.setItem('mq_ayah_idx', S.audioIndex);
  localStorage.setItem('mq_font', S.fontSize);
  localStorage.setItem('mq_dark', S.isDark);
  localStorage.setItem('mq_rate', S.playbackRate);
  localStorage.setItem('mq_reciter', S.reciter);
  localStorage.setItem('mq_bookmarks', JSON.stringify(S.bookmarks));
  localStorage.setItem('mq_tasbih', S.tasbihCount);
  localStorage.setItem('mq_autoscroll', S.autoScroll);
  localStorage.setItem('mq_autoplay', S.autoPlay);
  localStorage.setItem('mq_repeat', S.repeatAyah);
  localStorage.setItem('mq_repeatcount', S.repeatCount);
  localStorage.setItem('mq_font_family', S.fontFamily);
  if (quranContent) localStorage.setItem('mq_scroll', quranContent.scrollTop);
}

function loadState() {
  const d = localStorage;
  if (d.getItem('mq_surah')) S.surahId = parseInt(d.getItem('mq_surah')) || 1;
  if (d.getItem('mq_ayah_idx')) S.audioIndex = parseInt(d.getItem('mq_ayah_idx')) || 0;
  if (d.getItem('mq_font')) S.fontSize = parseFloat(d.getItem('mq_font')) || 1.6;
  S.isDark = d.getItem('mq_dark') === 'true';
  if (d.getItem('mq_rate')) S.playbackRate = parseFloat(d.getItem('mq_rate')) || 1;
  if (d.getItem('mq_reciter')) S.reciter = d.getItem('mq_reciter');
  try { S.bookmarks = JSON.parse(d.getItem('mq_bookmarks') || '[]'); } catch(e) { S.bookmarks = []; }
  if (d.getItem('mq_tasbih')) S.tasbihCount = parseInt(d.getItem('mq_tasbih')) || 0;
  S.autoScroll = d.getItem('mq_autoscroll') !== 'false';
  S.autoPlay = d.getItem('mq_autoplay') !== 'false';
  S.repeatAyah = d.getItem('mq_repeat') === 'true';
  if (d.getItem('mq_repeatcount')) S.repeatCount = parseInt(d.getItem('mq_repeatcount')) || 1;
  if (d.getItem('mq_font_family')) S.fontFamily = d.getItem('mq_font_family');
}

/* ══════════════════════════ THEME ══════════════════════════ */
function applyTheme() {
  if (S.isDark) {
    document.body.classList.add('dark');
    $('themeBtn').innerHTML = '<i class="fas fa-sun"></i>';
  } else {
    document.body.classList.remove('dark');
    $('themeBtn').innerHTML = '<i class="fas fa-moon"></i>';
  }
}

function toggleTheme() {
  S.isDark = !S.isDark;
  applyTheme();
  saveState();
}

/* ══════════════════════════ FONT ══════════════════════════ */
function applyFont() {
  document.querySelectorAll('.word').forEach(w => {
    w.style.fontSize = S.fontSize + 'rem';
    w.style.lineHeight = (S.fontSize * 1.35) + 'rem';
    w.style.fontFamily = S.fontFamily;
  });
  const b = document.querySelector('.basmala-text');
  if (b) {
    b.style.fontSize = Math.min(S.fontSize + 0.3, 2.6) + 'rem';
    b.style.fontFamily = S.fontFamily;
  }
}
function fontPlus() { if (S.fontSize < 2.5) { S.fontSize = Math.round((S.fontSize + 0.1)*10)/10; applyFont(); saveState(); } }
function fontMinus() { if (S.fontSize > 1.0) { S.fontSize = Math.round((S.fontSize - 0.1)*10)/10; applyFont(); saveState(); } }

/* ══════════════════════════ BASMALA ══════════════════════════ */
function removeBasmala(text) {
  return text.replace(/^بِ?سْمِ?\s+اللَّهِ?\s+الرَّحْمَٰ?نِ?\s+الرَّحِيمِ?\s*/i, '').trim();
}

/* ══════════════════════════ RENDER ══════════════════════════ */
function renderSurah() {
  if (!S.surahData || !S.ayahs.length) return;
  let html = '';
  if (S.surahId !== 9) {
    html += `<div class="basmala-wrap">
      <div class="basmala-text" style="font-size:${Math.min(S.fontSize+0.3,2.6)}rem; font-family:${S.fontFamily}">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>
      <div class="basmala-deco"><i class="fas fa-star"></i><i class="fas fa-circle" style="font-size:.3rem"></i><i class="fas fa-star"></i></div>
    </div>`;
  }
  S.ayahs.forEach((ayah, idx) => {
    let text = ayah.text;
    if (idx === 0 && S.surahId !== 9) text = removeBasmala(text);
    const words = text.split(/\s+/).filter(w => w.length > 0);
    const isBookmarked = S.bookmarks.some(b => b.surah === S.surahId && b.ayah === ayah.number);
    html += `<div class="aya${isBookmarked?' bookmarked':''}" data-n="${ayah.number}" data-i="${idx}">
      <span class="bookmark-star" onclick="toggleBookmark(${ayah.number},event)" title="حفظ الآية"><i class="fas fa-star"></i></span>
      <div class="ayah-body">`;
    words.forEach(w => {
      html += `<span class="word" style="font-size:${S.fontSize}rem;line-height:${S.fontSize*1.35}rem;font-family:${S.fontFamily}" data-word="${w}">${w}</span>`;
    });
    html += `<span class="aya-num">${toArabicNum(ayah.number)}</span>`;
    html += `</div></div>`;
  });
  quranContent.innerHTML = html;
  
  // Restore scroll
  const savedScroll = localStorage.getItem('mq_scroll');
  if (savedScroll) quranContent.scrollTop = parseInt(savedScroll);
  
  // Word click for tafseer
  document.querySelectorAll('.aya').forEach(el => {
    el.addEventListener('dblclick', () => {
      openTafseer(parseInt(el.dataset.n));
    });
  });
  
  // Word hover tooltip
  document.querySelectorAll('.word').forEach(w => {
    w.addEventListener('mouseenter', (e) => showTooltip(e, w.dataset.word));
    w.addEventListener('mouseleave', () => hideTooltip());
    w.addEventListener('touchstart', (e) => { e.preventDefault(); showTooltip(e.touches[0], w.dataset.word); setTimeout(hideTooltip, 2000); });
  });
}

/* ══════════════════════════ HIGHLIGHT ══════════════════════════ */
function highlightAyah(n) {
  document.querySelectorAll('.aya').forEach(el => el.classList.remove('active'));
  const el = document.querySelector(`.aya[data-n="${n}"]`);
  if (el) {
    el.classList.add('active');
    if (S.autoScroll) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
  // Update progress
  const total = S.ayahs.length;
  const cur = S.audioQueue.findIndex(a => a.n === n) + 1;
  const pct = total ? (cur / total) * 100 : 0;
  progressFill.style.width = pct + '%';
  progressLabel.textContent = `${toArabicNum(cur)}/${toArabicNum(total)}`;
}

function clearHighlight() {
  document.querySelectorAll('.aya').forEach(el => el.classList.remove('active'));
  progressFill.style.width = '0%';
  progressLabel.textContent = `٠/٠`;
}

/* ══════════════════════════ AUDIO ══════════════════════════ */
function getAudioUrl(reciter, surah, ayah) {
  return `https://everyayah.com/data/${reciter}/${String(surah).padStart(3,'0')}${String(ayah).padStart(3,'0')}.mp3`;
}

function playQueue() {
  if (!S.isPlaying) return;
  if (S.audioIndex >= S.audioQueue.length) {
    S.isPlaying = false;
    clearHighlight();
    setStatus('✅ انتهت التلاوة كاملةً. جزاكم الله خيراً 🌿');
    playBtn.style.display = '';
    pauseBtn.style.display = 'none';
    saveState();
    return;
  }
  const item = S.audioQueue[S.audioIndex];
  highlightAyah(item.n);
  setStatus(`🔊 الآية ${toArabicNum(item.n)} من ${toArabicNum(S.ayahs.length)} · السرعة ${S.playbackRate}×`);
  const url = getAudioUrl(S.reciter, S.surahId, item.n);
  if (S.audioEl) { S.audioEl.pause(); }
  S.audioEl = new Audio(url);
  S.audioEl.playbackRate = S.playbackRate;
  S.audioEl.play().catch(() => { S.audioIndex++; playQueue(); });
  S.audioEl.onended = () => {
    if (S.repeatAyah && S.repeatCurrent < S.repeatCount - 1) {
      S.repeatCurrent++;
      playQueue();
      return;
    }
    S.repeatCurrent = 0;
    S.audioIndex++;
    saveState();
    playQueue();
  };
  S.audioEl.onerror = () => { S.audioIndex++; playQueue(); };
}

function startPlay(resume = true) {
  if (!S.ayahs.length) { setStatus('⚠️ انتظر تحميل السورة'); return; }
  stopAudio(false);
  S.audioQueue = S.ayahs.map((a, idx) => {
    let text = a.text;
    if (idx === 0 && S.surahId !== 9) text = removeBasmala(text);
    return { n: a.number, text };
  });
  let startIdx = 0;
  if (resume && S.audioIndex > 0 && S.audioIndex < S.audioQueue.length) {
    startIdx = S.audioIndex;
    setStatus(`🔄 استئناف من الآية ${toArabicNum(S.audioQueue[startIdx].n)}`);
  }
  S.audioIndex = startIdx;
  S.isPlaying = true;
  S.isPaused = false;
  playBtn.style.display = 'none';
  pauseBtn.style.display = '';
  playQueue();
}

function pauseAudio() {
  if (S.audioEl && !S.audioEl.paused) {
    S.audioEl.pause();
    S.isPaused = true;
    S.isPlaying = false;
    playBtn.innerHTML = '<i class="fas fa-play"></i> متابعة';
    playBtn.style.display = '';
    pauseBtn.style.display = 'none';
    setStatus('⏸️ إيقاف مؤقت');
  }
}

function resumeAudio() {
  if (S.audioEl && S.audioEl.paused && S.isPaused) {
    S.isPlaying = true;
    S.isPaused = false;
    S.audioEl.play();
    playBtn.innerHTML = '<i class="fas fa-headphones"></i> تلاوة';
    playBtn.style.display = 'none';
    pauseBtn.style.display = '';
    setStatus(`🔊 متابعة التلاوة...`);
  } else {
    playBtn.innerHTML = '<i class="fas fa-headphones"></i> تلاوة';
    startPlay(true);
  }
}

function stopAudio(save = true) {
  if (S.audioEl) { S.audioEl.pause(); S.audioEl = null; }
  S.isPlaying = false;
  S.isPaused = false;
  if (save) {
    clearHighlight();
    setStatus('⏹️ تم الإيقاف · تم حفظ مكانك ✓');
    saveState();
  }
  playBtn.innerHTML = '<i class="fas fa-headphones"></i> تلاوة';
  playBtn.style.display = '';
  pauseBtn.style.display = 'none';
}

function setSpeed(rate) {
  S.playbackRate = rate;
  if (S.audioEl) S.audioEl.playbackRate = rate;
  document.querySelectorAll('.speed-btn').forEach(b => {
    b.classList.toggle('on', parseFloat(b.dataset.s) === rate);
  });
  saveState();
}

/* ══════════════════════════ SURAH LOAD ══════════════════════════ */
async function loadSurah() {
  stopAudio(false);
  quranContent.innerHTML = `<div style="text-align:center;padding:3rem;color:var(--status);"><i class="fas fa-spinner fa-pulse fa-2x"></i><br><br>جاري تحميل السورة...</div>`;
  setStatus('⟳ جاري التحميل...');

  let data = S.surahCache.get(S.surahId);
  if (!data) {
    try {
      const r = await fetch(`https://api.alquran.cloud/v1/surah/${S.surahId}/editions/quran-uthmani`);
      const j = await r.json();
      if (j.code === 200 && j.data && j.data[0]) {
        const ed = j.data[0];
        data = {
          name: ed.name,
          englishName: ed.englishName,
          numberOfAyahs: ed.numberOfAyahs,
          revelationType: ed.revelationType,
          ayahs: ed.ayahs.map(a => ({ number: a.numberInSurah, text: a.text }))
        };
        S.surahCache.set(S.surahId, data);
      } else throw new Error();
    } catch (e) {
      quranContent.innerHTML = `<div style="text-align:center;padding:2rem;color:#c04030;">⚠️ فشل التحميل. تأكد من الاتصال بالإنترنت.</div>`;
      setStatus('❌ فشل التحميل');
      return;
    }
  }

  S.surahData = data;
  S.ayahs = data.ayahs.map(a => ({...a}));
  surahName.textContent = data.name;
  infoAyahs.textContent = toArabicNum(data.numberOfAyahs);
  infoType.innerHTML = data.revelationType === 'Meccan' ? '<i class="fas fa-kaaba"></i> مكية' : '<i class="fas fa-mosque"></i> مدنية';
  infoPage.innerHTML = `<i class="fas fa-book-open"></i> سورة ${toArabicNum(S.surahId)}`;

  renderSurah();
  setStatus(`✓ سورة ${data.name} · ${toArabicNum(data.numberOfAyahs)} آية · جاهز`);
  localStorage.setItem('mq_surah', S.surahId);

  if (S.audioIndex > 0 && S.audioIndex <= S.ayahs.length) {
    setTimeout(() => highlightAyah(S.ayahs[Math.min(S.audioIndex, S.ayahs.length-1)].number), 500);
  }
}

async function loadSurahList() {
  try {
    const r = await fetch('https://api.alquran.cloud/v1/surah');
    const j = await r.json();
    if (j.code === 200 && j.data) {
      S.surahList = j.data;
      surahSel.innerHTML = '';
      j.data.forEach(s => {
        const o = document.createElement('option');
        o.value = s.number;
        o.textContent = `${toArabicNum(s.number)}. ${s.name}`;
        surahSel.appendChild(o);
      });
      surahSel.value = S.surahId;
      await loadSurah();
    }
  } catch(e) {
    surahSel.innerHTML = '<option>خطأ في التحميل</option>';
    setStatus('❌ خطأ في تحميل قائمة السور');
  }
}

/* ══════════════════════════ SEARCH ══════════════════════════ */
let searchTimeout;
function doSearch() {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => {
    const q = searchInput.value.trim();
    document.querySelectorAll('.word').forEach(w => {
      w.classList.remove('search-highlight', 'search-current');
    });
    if (!q) { searchCount.textContent = '—'; S.searchResults = []; return; }
    const words = document.querySelectorAll('.word');
    S.searchResults = [];
    words.forEach(w => {
      if (w.textContent.includes(q) || w.dataset.word.includes(q)) {
        w.classList.add('search-highlight');
        S.searchResults.push(w);
      }
    });
    S.searchIndex = 0;
    if (S.searchResults.length) {
      gotoSearchResult(0);
      searchCount.textContent = `${toArabicNum(S.searchResults.length)} نتيجة`;
    } else {
      searchCount.textContent = 'لا نتائج';
    }
  }, 300);
}

function gotoSearchResult(idx) {
  S.searchResults.forEach(w => w.classList.remove('search-current'));
  if (S.searchResults[idx]) {
    S.searchResults[idx].classList.add('search-current');
    S.searchResults[idx].scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}
function searchNext() { if (!S.searchResults.length) return; S.searchIndex = (S.searchIndex + 1) % S.searchResults.length; gotoSearchResult(S.searchIndex); searchCount.textContent = `${toArabicNum(S.searchIndex+1)}/${toArabicNum(S.searchResults.length)}`; }
function searchPrev() { if (!S.searchResults.length) return; S.searchIndex = (S.searchIndex - 1 + S.searchResults.length) % S.searchResults.length; gotoSearchResult(S.searchIndex); searchCount.textContent = `${toArabicNum(S.searchIndex+1)}/${toArabicNum(S.searchResults.length)}`; }
function clearSearch() { searchInput.value = ''; doSearch(); searchPanel.classList.remove('show'); }

/* ══════════════════════════ BOOKMARKS ══════════════════════════ */
function toggleBookmark(ayahNum, e) {
  if (e) e.stopPropagation();
  const idx = S.bookmarks.findIndex(b => b.surah === S.surahId && b.ayah === ayahNum);
  const ayah = S.ayahs.find(a => a.number === ayahNum);
  if (idx >= 0) {
    S.bookmarks.splice(idx, 1);
    const el = document.querySelector(`.aya[data-n="${ayahNum}"]`);
    if (el) el.classList.remove('bookmarked');
    setStatus(`🗑️ تم حذف الآية ${toArabicNum(ayahNum)} من المفضلة`);
  } else {
    S.bookmarks.push({ surah: S.surahId, ayah: ayahNum, surahName: S.surahData?.name, text: ayah?.text?.substring(0, 60) || '' });
    const el = document.querySelector(`.aya[data-n="${ayahNum}"]`);
    if (el) el.classList.add('bookmarked');
    setStatus(`⭐ تم حفظ الآية ${toArabicNum(ayahNum)} في المفضلة`);
  }
  renderBookmarks();
  saveState();
}

function renderBookmarks() {
  if (!S.bookmarks.length) {
    bookmarksList.innerHTML = `<div style="text-align:center;color:var(--status);font-size:0.72rem;padding:0.5rem;">لا توجد آيات محفوظة</div>`;
    return;
  }
  bookmarksList.innerHTML = S.bookmarks.map((b, i) => `
    <div class="bookmark-item" onclick="gotoBookmark(${i})">
      <span class="bi-num">${toArabicNum(b.ayah)}</span>
      <span style="font-size:0.68rem;color:var(--gold-deep);font-weight:700;">${b.surahName || ''}</span>
      <span class="bi-text">${b.text}...</span>
      <span class="bi-del" onclick="removeBookmark(${i},event)"><i class="fas fa-trash-alt"></i></span>
    </div>
  `).join('');
}

function gotoBookmark(idx) {
  const b = S.bookmarks[idx];
  if (!b) return;
  if (b.surah !== S.surahId) {
    S.surahId = b.surah;
    surahSel.value = b.surah;
    S.audioIndex = S.ayahs.findIndex(a => a.number === b.ayah);
    loadSurah().then(() => {
      setTimeout(() => {
        const el = document.querySelector(`.aya[data-n="${b.ayah}"]`);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 500);
    });
  } else {
    const el = document.querySelector(`.aya[data-n="${b.ayah}"]`);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

function removeBookmark(idx, e) {
  if (e) e.stopPropagation();
  S.bookmarks.splice(idx, 1);
  renderBookmarks();
  renderSurah();
  saveState();
}

/* ══════════════════════════ TAFSEER MODAL ══════════════════════════ */
async function openTafseer(ayahNum) {
  const ayah = S.ayahs.find(a => a.number === ayahNum);
  if (!ayah) return;
  $('modalTitle').textContent = `تفسير الآية ${toArabicNum(ayahNum)} — سورة ${S.surahData?.name || ''}`;
  $('modalAyahText').textContent = ayah.text;
  $('modalContent').innerHTML = `<div class="modal-loading"><i class="fas fa-spinner fa-pulse"></i> جاري تحميل التفسير...</div>`;
  $('tafseerModal').classList.add('open');
  try {
    const r = await fetch(`https://api.alquran.cloud/v1/ayah/${S.surahId}:${ayahNum}/ar.muyassar`);
    const j = await r.json();
    if (j.code === 200 && j.data) {
      $('modalContent').innerHTML = `
        <div style="font-family:'Tajawal',sans-serif;font-size:0.88rem;line-height:1.9;color:var(--text);">
          <div style="font-size:0.72rem;color:var(--gold-deep);font-weight:700;margin-bottom:0.5rem;"><i class="fas fa-book"></i> التفسير الميسر</div>
          ${j.data.text}
        </div>`;
    } else throw new Error();
  } catch(e) {
    $('modalContent').innerHTML = `<div style="color:#c04030;text-align:center;padding:0.5rem;">⚠️ تعذّر تحميل التفسير الآن.<br><small>انقر مرتين على أي آية لعرض تفسيرها</small></div>`;
  }
}

function closeModal() {
  $('tafseerModal').classList.remove('open');
}

/* ══════════════════════════ TOOLTIP ══════════════════════════ */
function showTooltip(e, word) {
  tooltip.textContent = word;
  tooltip.classList.add('show');
  posTooltip(e);
}
function posTooltip(e) {
  const x = e.clientX || e.pageX;
  const y = e.clientY || e.pageY;
  tooltip.style.left = Math.min(x + 12, window.innerWidth - 200) + 'px';
  tooltip.style.top = Math.max(y - 40, 10) + 'px';
}
function hideTooltip() { tooltip.classList.remove('show'); }

/* ══════════════════════════ SETTINGS ══════════════════════════ */
function applySettings() {
  $('autoScrollToggle').classList.toggle('on', S.autoScroll);
  $('autoPlayToggle').classList.toggle('on', S.autoPlay);
  $('repeatToggle').classList.toggle('on', S.repeatAyah);
  $('repeatCount').value = S.repeatCount;
  $('fontFamilySel').value = S.fontFamily;
}

/* ══════════════════════════ TASBIH ══════════════════════════ */
tasbihBtn.addEventListener('click', () => {
  S.tasbihCount++;
  tasbihCount.textContent = S.tasbihCount % 100;
  tasbihBtn.style.transform = 'scale(0.92)';
  setTimeout(() => tasbihBtn.style.transform = '', 100);
  if (S.tasbihCount % 33 === 0) {
    const phrases = { 33: 'سبحان الله ٣٣', 66: 'الحمد لله ٦٦', 99: 'الله أكبر ٩٩', 100: '🌟 لا إله إلا الله' };
    const ph = Object.keys(phrases).find(k => S.tasbihCount % 100 === parseInt(k));
    if (ph) setStatus(`✨ ${phrases[ph]}`);
  }
  saveState();
});

tasbihBtn.addEventListener('dblclick', (e) => {
  e.preventDefault();
  S.tasbihCount = 0;
  tasbihCount.textContent = 0;
  setStatus('🔄 تم إعادة تعيين العداد');
  saveState();
});

/* ══════════════════════════ JUMP TO AYAH ══════════════════════════ */
function jumpToAyah() {
  if (!S.ayahs.length) { setStatus('⚠️ انتظر تحميل السورة'); return; }
  const n = prompt(`أدخل رقم الآية (١ - ${S.ayahs.length})`);
  if (!n) return;
  const num = parseInt(n);
  if (isNaN(num) || num < 1 || num > S.ayahs.length) { setStatus('⚠️ رقم آية غير صحيح'); return; }
  const el = document.querySelector(`.aya[data-n="${num}"]`);
  if (el) { el.scrollIntoView({ behavior: 'smooth', block: 'center' }); setStatus(`📌 انتقلت للآية ${toArabicNum(num)}`); }
}

/* ══════════════════════════ EVENTS ══════════════════════════ */
surahSel.addEventListener('change', () => {
  S.surahId = parseInt(surahSel.value);
  S.audioIndex = 0;
  loadSurah();
});

reciterSel.addEventListener('change', () => {
  S.reciter = reciterSel.value;
  if (S.isPlaying) { stopAudio(true); setStatus('🔄 تم تغيير القارئ'); }
  saveState();
});

playBtn.addEventListener('click', resumeAudio);
pauseBtn.addEventListener('click', pauseAudio);
stopBtn.addEventListener('click', () => { stopAudio(true); });

$('fontPlusBtn').addEventListener('click', fontPlus);
$('fontMinusBtn').addEventListener('click', fontMinus);
$('themeBtn').addEventListener('click', toggleTheme);

$('jumpAyahBtn').addEventListener('click', jumpToAyah);

$('searchToggleBtn').addEventListener('click', () => {
  S.showSearch = !S.showSearch;
  searchPanel.classList.toggle('show', S.showSearch);
  if (S.showSearch) setTimeout(() => searchInput.focus(), 100);
  else clearSearch();
});

$('bookmarkPanelBtn').addEventListener('click', () => {
  S.showBookmarks = !S.showBookmarks;
  bookmarksPanel.classList.toggle('show', S.showBookmarks);
  if (S.showBookmarks) renderBookmarks();
});

$('settingsBtn').addEventListener('click', () => {
  S.showSettings = !S.showSettings;
  settingsPanel.classList.toggle('show', S.showSettings);
  applySettings();
});

searchInput.addEventListener('input', doSearch);
$('searchNextBtn').addEventListener('click', searchNext);
$('searchPrevBtn').addEventListener('click', searchPrev);

document.querySelectorAll('.speed-btn').forEach(b => {
  b.addEventListener('click', () => setSpeed(parseFloat(b.dataset.s)));
});

$('prevSurahBtn').addEventListener('click', () => {
  if (S.surahId > 1) { S.surahId--; surahSel.value = S.surahId; S.audioIndex = 0; loadSurah(); }
});
$('nextSurahBtn').addEventListener('click', () => {
  if (S.surahId < 114) { S.surahId++; surahSel.value = S.surahId; S.audioIndex = 0; loadSurah(); }
});

progressBar.addEventListener('click', (e) => {
  if (!S.ayahs.length) return;
  const rect = progressBar.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  const idx = Math.floor(pct * S.ayahs.length);
  const clamped = Math.max(0, Math.min(idx, S.ayahs.length - 1));
  S.audioIndex = clamped;
  const n = S.ayahs[clamped].number;
  const el = document.querySelector(`.aya[data-n="${n}"]`);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  if (S.isPlaying) { stopAudio(false); startPlay(true); }
  setStatus(`📌 انتقلت للآية ${toArabicNum(n)}`);
});

$('autoScrollToggle').addEventListener('click', () => { S.autoScroll = !S.autoScroll; applySettings(); saveState(); });
$('autoPlayToggle').addEventListener('click', () => { S.autoPlay = !S.autoPlay; applySettings(); saveState(); });
$('repeatToggle').addEventListener('click', () => { S.repeatAyah = !S.repeatAyah; S.repeatCurrent = 0; applySettings(); saveState(); });
$('repeatCount').addEventListener('change', () => { S.repeatCount = parseInt($('repeatCount').value); saveState(); });
$('fontFamilySel').addEventListener('change', () => { S.fontFamily = $('fontFamilySel').value; applyFont(); saveState(); });

$('tafseerModal').addEventListener('click', (e) => { if (e.target === $('tafseerModal')) closeModal(); });

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') { closeModal(); clearSearch(); }
  if (e.key === ' ' && !searchInput.matches(':focus')) { e.preventDefault(); S.isPlaying ? pauseAudio() : resumeAudio(); }
  if (e.key === 'ArrowRight') { if (S.surahId < 114) { S.surahId++; surahSel.value = S.surahId; S.audioIndex = 0; loadSurah(); } }
  if (e.key === 'ArrowLeft') { if (S.surahId > 1) { S.surahId--; surahSel.value = S.surahId; S.audioIndex = 0; loadSurah(); } }
  if (e.key === '+') fontPlus();
  if (e.key === '-') fontMinus();
});

quranContent.addEventListener('scroll', () => {
  localStorage.setItem('mq_scroll', quranContent.scrollTop);
});

/* ══════════════════════════ INIT ══════════════════════════ */
async function init() {
  loadState();
  applyTheme();
  
  // Update tasbih display
  tasbihCount.textContent = S.tasbihCount % 100;
  
  // Set saved reciter
  reciterSel.value = S.reciter;
  
  // Set saved speed
  setSpeed(S.playbackRate);
  
  await loadSurahList();
  
  // Hide loading
  setTimeout(() => {
    $('loadingScreen').classList.add('hidden');
  }, 1200);
}

init();
</script>
</body>
</html>
