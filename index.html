<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>المصحف الذهبي | استماع وتفسير بتصميم ورقي فاخر</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* خلفية محيطة مثل سطح ذهبي */
        body {
            background: #a5833e;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            font-family: 'Amiri Quran', 'Tajawal', serif;
            transition: background 0.3s;
        }

        /* الوضع الليلي الفاخر */
        body.dark-mode {
            background: #1f2a1a;
        }
        body.dark-mode .mushaf-container {
            background: #2a3822;
            border-color: #c9a45b;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), inset 0 0 15px rgba(210,170,70,0.2);
        }
        body.dark-mode .paper-page {
            background: #2d3a24;
            color: #f2e2bc;
        }
        body.dark-mode .surah-name {
            color: #f3cf7a;
        }
        body.dark-mode .ayah-text {
            color: #f7efd6;
        }
        body.dark-mode .ayah-number {
            background: #c9a45b;
            color: #2a3a1f;
        }
        body.dark-mode .translation-text {
            background: rgba(201, 164, 91, 0.2);
            color: #eeddbb;
            border-right-color: #dbb45c;
        }
        body.dark-mode .control-bar, body.dark-mode .audio-bar {
            background: #2a3722;
            border-color: #b88b3a;
        }
        body.dark-mode .ctrl-btn, body.dark-mode .ctrl-select, body.dark-mode .speed-btn {
            background: #3d4f30;
            color: #f5e2b0;
            border-color: #c9a45b;
        }
        body.dark-mode .page-btn {
            background: #3d4f30;
            color: #f5e2b0;
        }

        /* الإطار الخارجي للمصحف */
        .mushaf-container {
            max-width: 1300px;
            width: 100%;
            background: #ecdca8;
            border-radius: 48px 48px 40px 40px;
            border: 12px double #dbb45c;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3), inset 0 0 20px rgba(210, 170, 70, 0.4);
            padding: 1.2rem;
            position: relative;
            transition: all 0.3s;
        }
        .mushaf-container::before,
        .mushaf-container::after {
            content: "✦";
            font-size: 2rem;
            color: #c9a45b;
            position: absolute;
            text-shadow: 0 0 3px gold;
        }
        .mushaf-container::before {
            top: -10px;
            right: 25px;
        }
        .mushaf-container::after {
            bottom: -10px;
            left: 25px;
            transform: rotate(180deg);
        }
        .ornament {
            text-align: center;
            font-size: 1.2rem;
            letter-spacing: 8px;
            color: #dbb45c;
            margin-top: -0.6rem;
            margin-bottom: 0.5rem;
        }

        /* الورقة الداخلية */
        .paper-page {
            background: #fffef0;
            border-radius: 28px;
            padding: 1.8rem 2rem 1.5rem;
            box-shadow: inset 0 0 0 1px #f3e9cf, 0 8px 18px rgba(0,0,0,0.1);
        }

        /* رأس السورة */
        .surah-head {
            text-align: center;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #e2ca8a;
            padding-bottom: 0.6rem;
        }
        .surah-name {
            font-size: 2.4rem;
            font-weight: 800;
            color: #8a6020;
            font-family: 'Amiri Quran', serif;
        }
        .surah-extra {
            font-size: 1.2rem;
            color: #a87b2e;
            margin-top: 0.2rem;
        }

        /* أشرطة التحكم (الوظائف + الصوت) */
        .control-bar, .audio-bar {
            background: #f2e8d4;
            border-radius: 60px;
            padding: 0.5rem 1rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.6rem;
            margin-bottom: 1rem;
            border: 1px solid #e2cf9e;
        }
        .audio-bar {
            background: #efe2ca;
            margin-bottom: 1rem;
        }
        .ctrl-btn, .ctrl-select, .speed-btn {
            background: #fff6e5;
            border: 1px solid #dbbc7c;
            padding: 0.35rem 1rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #5c451c;
            transition: 0.2s;
            font-family: 'Tajawal', sans-serif;
        }
        .ctrl-btn:hover, .speed-btn:hover {
            background: #e5d3b0;
            transform: translateY(-2px);
        }
        .speed-btn.active-speed {
            background: #c9a45b;
            color: white;
            border-color: #a57c2e;
        }
        .status-msg {
            font-size: 0.75rem;
            color: #b87c2e;
            text-align: center;
            margin: 0.2rem 0;
        }

        /* التنقل بين الصفحات */
        .page-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }
        .nav-buttons {
            display: flex;
            gap: 0.8rem;
        }
        .page-btn {
            background: #e9dcbf;
            border: none;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.2s;
        }
        .page-btn:hover:not(:disabled) {
            background: #c9a45b;
            color: white;
        }
        .page-indicator {
            background: #e9dcbf;
            padding: 0.2rem 1.2rem;
            border-radius: 40px;
            font-weight: bold;
            font-size: 0.9rem;
        }

        /* منطقة الآيات */
        .quran-scroll {
            max-height: 58vh;
            overflow-y: auto;
            padding-left: 5px;
            padding-right: 5px;
            direction: rtl;
        }
        .aya-wrapper {
            margin-bottom: 1.4rem;
            padding: 0.2rem 0;
            border-bottom: 1px solid rgba(160, 120, 50, 0.2);
        }
        .aya-line {
            display: flex;
            align-items: baseline;
            gap: 12px;
            flex-wrap: wrap;
        }
        .ayah-number {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #e7dbb8;
            color: #5c401a;
            border-radius: 50px;
            min-width: 2.2rem;
            height: 2.2rem;
            font-size: 0.95rem;
            font-weight: bold;
            font-family: 'Tajawal', sans-serif;
            padding: 0 8px;
        }
        .ayah-text {
            font-family: 'Amiri Quran', 'Tajawal', serif;
            font-size: 1.55rem;
            line-height: 2.5rem;
            font-weight: 500;
            color: #2c2b1f;
            flex: 1;
            text-align: right;
        }
        .translation-text {
            font-family: 'Tajawal', sans-serif;
            font-size: 0.85rem;
            color: #7a602e;
            background: rgba(220, 195, 130, 0.15);
            padding: 0.3rem 1rem;
            border-radius: 20px;
            margin-top: 0.5rem;
            margin-right: 2rem;
            border-right: 3px solid #dbb45c;
            width: fit-content;
            max-width: 90%;
        }

        .quran-scroll::-webkit-scrollbar {
            width: 8px;
        }
        .quran-scroll::-webkit-scrollbar-track {
            background: #ede0c2;
            border-radius: 10px;
        }
        .quran-scroll::-webkit-scrollbar-thumb {
            background: #c9a45b;
            border-radius: 10px;
        }

        .footer-note {
            text-align: center;
            margin-top: 1.2rem;
            font-size: 0.7rem;
            color: #8a6b36;
            border-top: 1px solid #e6d4ae;
            padding-top: 0.6rem;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        @media (max-width: 750px) {
            body { padding: 0.8rem; }
            .mushaf-container { padding: 0.6rem; border-width: 6px double; }
            .paper-page { padding: 1rem; }
            .ayah-text { font-size: 1.2rem; line-height: 2rem; }
            .surah-name { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
<div class="mushaf-container">
    <div class="ornament">
        <i class="fas fa-star-of-life"></i> <i class="fas fa-circle-notch"></i> <i class="fas fa-leaf"></i>
    </div>
    <div class="paper-page">
        <!-- شريط التحكم الأساسي -->
        <div class="control-bar">
            <select id="surahSelect" class="ctrl-select">
                <option>جاري تحميل السور...</option>
            </select>
            <button id="fontPlusBtn" class="ctrl-btn"><i class="fas fa-plus-circle"></i> تكبير الخط</button>
            <button id="fontMinusBtn" class="ctrl-btn"><i class="fas fa-minus-circle"></i> تصغير الخط</button>
            <button id="themeToggleBtn" class="ctrl-btn"><i class="fas fa-moon"></i> ليلي</button>
        </div>

        <!-- شريط الصوت والقراء -->
        <div class="audio-bar">
            <select id="reciterSelect" class="ctrl-select">
                <option value="Alafasy_128kbps">🎙️ مشاري راشد العفاسي</option>
                <option value="Abdul_Basit_Mujawwad_128kbps">🎙️ عبد الباسط عبد الصمد</option>
                <option value="Husary_128kbps">🎙️ محمود خليل الحصري</option>
                <option value="Maher_AlMuaiqly_128kbps">🎙️ ماهر المعيقلي</option>
                <option value="Shuraym_128kbps">🎙️ سعود الشريم</option>
                <option value="Sudais_128kbps">🎙️ عبد الرحمن السديس</option>
                <option value="Yasser_Ad-Dussary_128kbps">🎙️ ياسر الدوسري</option>
            </select>
            <div class="speed-group" style="display: flex; gap: 0.2rem; background: #e9dbbc; border-radius: 50px; padding: 0 0.3rem;">
                <button data-speed="0.5" class="speed-btn">0.5x</button>
                <button data-speed="0.75" class="speed-btn">0.75x</button>
                <button data-speed="1" class="speed-btn active-speed">1x</button>
                <button data-speed="1.25" class="speed-btn">1.25x</button>
                <button data-speed="1.5" class="speed-btn">1.5x</button>
                <button data-speed="2" class="speed-btn">2x</button>
            </div>
            <button id="listenPageBtn" class="ctrl-btn" style="background:#2a6e48; color:white;"><i class="fas fa-headphones"></i> استماع الصفحة</button>
            <button id="stopAudioBtn" class="ctrl-btn" style="background:#b45a2e; color:white;"><i class="fas fa-stop-circle"></i> إيقاف</button>
        </div>
        <div id="audioStatus" class="status-msg"></div>

        <!-- رأس السورة -->
        <div class="surah-head">
            <div class="surah-name" id="surahName">الفرق الكرمي</div>
            <div class="surah-extra" id="surahSub">يُؤَكِّدُ النَّفْخَتَيْنِ!</div>
        </div>

        <!-- التنقل بين الصفحات -->
        <div class="page-nav">
            <div></div>
            <div class="nav-buttons">
                <button id="prevPageBtn" class="page-btn"><i class="fas fa-chevron-right"></i></button>
                <span id="pageNumber" class="page-indicator">الصفحة 1</span>
                <button id="nextPageBtn" class="page-btn"><i class="fas fa-chevron-left"></i></button>
            </div>
        </div>

        <!-- عرض الآيات -->
        <div id="quranContent" class="quran-scroll">
            <div style="text-align:center; padding:2rem;"><i class="fas fa-spinner fa-pulse"></i> جلب آيات المصحف...</div>
        </div>

        <div class="footer-note">
            <i class="fas fa-quran"></i> المصحف الذهبي – استمع للصفحة كاملة باختيار القارئ وسرعة التلاوة
        </div>
    </div>
</div>

<script>
    // --------------------- المتغيرات العامة ---------------------
    let currentSurahId = 1;
    let currentPage = 1;
    let surahData = null;
    let pagesMap = new Map();
    let availablePages = [];

    // متغيرات الصوت
    let currentAudioQueue = [];
    let isPlayingPage = false;
    let currentAudioIndex = 0;
    let currentAudioElement = null;
    let currentPlaybackRate = 1.0;
    let currentReciter = "Alafasy_128kbps";

    let currentFontSize = 1.55;
    const MIN_FONT = 1.0, MAX_FONT = 2.4;
    const surahCache = new Map();
    let surahList = [];

    // عناصر DOM
    const surahSelect = document.getElementById('surahSelect');
    const reciterSelect = document.getElementById('reciterSelect');
    const surahNameSpan = document.getElementById('surahName');
    const surahSubSpan = document.getElementById('surahSub');
    const quranContentDiv = document.getElementById('quranContent');
    const prevPageBtn = document.getElementById('prevPageBtn');
    const nextPageBtn = document.getElementById('nextPageBtn');
    const pageNumberSpan = document.getElementById('pageNumber');
    const fontPlusBtn = document.getElementById('fontPlusBtn');
    const fontMinusBtn = document.getElementById('fontMinusBtn');
    const themeToggleBtn = document.getElementById('themeToggleBtn');
    const listenPageBtn = document.getElementById('listenPageBtn');
    const stopAudioBtn = document.getElementById('stopAudioBtn');
    const audioStatusSpan = document.getElementById('audioStatus');

    // --------------------- دوال الصوت ---------------------
    function getAyahAudioUrl(reciterCode, surahId, ayahNumber) {
        const surahPadded = String(surahId).padStart(3, '0');
        const ayahPadded = String(ayahNumber).padStart(3, '0');
        return `https://everyayah.com/data/${reciterCode}/${surahPadded}${ayahPadded}.mp3`;
    }

    function stopPageAudio(resetQueue = true) {
        if (currentAudioElement) {
            currentAudioElement.pause();
            currentAudioElement.currentTime = 0;
            currentAudioElement = null;
        }
        if (resetQueue) {
            isPlayingPage = false;
            currentAudioIndex = 0;
            currentAudioQueue = [];
        } else {
            isPlayingPage = false;
        }
    }

    function playNextAyahInQueue() {
        if (!isPlayingPage) return;
        if (currentAudioIndex >= currentAudioQueue.length) {
            isPlayingPage = false;
            audioStatusSpan.innerHTML = '✅ انتهت تلاوة هذه الصفحة. جزاك الله خيراً.';
            currentAudioElement = null;
            return;
        }
        const ayahObj = currentAudioQueue[currentAudioIndex];
        audioStatusSpan.innerHTML = `🔊 تلاوة الآية ${ayahObj.ayahNumber} (السرعة ${currentPlaybackRate}x)`;
        const audioUrl = getAyahAudioUrl(currentReciter, ayahObj.surahId, ayahObj.ayahNumber);
        const audio = new Audio(audioUrl);
        currentAudioElement = audio;
        audio.playbackRate = currentPlaybackRate;
        audio.play().catch(() => {
            currentAudioIndex++;
            playNextAyahInQueue();
        });
        audio.onended = () => {
            currentAudioIndex++;
            playNextAyahInQueue();
        };
        audio.onerror = () => {
            currentAudioIndex++;
            playNextAyahInQueue();
        };
    }

    function startPagePlayback() {
        if (!surahData || !pagesMap.has(currentPage)) {
            audioStatusSpan.innerHTML = '⚠️ لا توجد آيات في هذه الصفحة.';
            return;
        }
        stopPageAudio(true);
        const ayahsOfPage = pagesMap.get(currentPage);
        if (!ayahsOfPage.length) return;
        currentAudioQueue = ayahsOfPage.map(ayah => ({
            surahId: currentSurahId,
            ayahNumber: ayah.number
        }));
        currentAudioIndex = 0;
        isPlayingPage = true;
        playNextAyahInQueue();
    }

    function setPlaybackRate(rate) {
        currentPlaybackRate = rate;
        if (currentAudioElement && !currentAudioElement.paused) {
            currentAudioElement.playbackRate = rate;
        }
        document.querySelectorAll('.speed-btn').forEach(btn => {
            const spd = parseFloat(btn.getAttribute('data-speed'));
            if (Math.abs(spd - rate) < 0.01) btn.classList.add('active-speed');
            else btn.classList.remove('active-speed');
        });
        localStorage.setItem('playbackRate', rate);
    }

    // --------------------- تحميل السورة والآيات مع الترجمة ---------------------
    async function fetchTranslation(surahId, ayahNumber) {
        try {
            const response = await fetch(`https://api.alquran.cloud/v1/ayah/${surahId}:${ayahNumber}/editions/quran-uthmani,ar.alafasy`);
            const data = await response.json();
            if (data.code === 200 && data.data && data.data.length >= 2) {
                return data.data[1].text;
            }
            return "";
        } catch {
            return "";
        }
    }

    async function loadSurahAndPage() {
        if (!currentSurahId) return;
        quranContentDiv.innerHTML = `<div style="text-align:center; padding:2rem;"><i class="fas fa-spinner fa-pulse"></i> جلب آيات السورة...</div>`;
        stopPageAudio(true);
        
        let surahFull = surahCache.get(currentSurahId);
        if (!surahFull) {
            try {
                const response = await fetch(`https://api.alquran.cloud/v1/surah/${currentSurahId}/editions/quran-uthmani`);
                const data = await response.json();
                if (data.code === 200 && data.data && data.data[0]) {
                    const edition = data.data[0];
                    surahFull = {
                        name: edition.name,
                        ayahs: edition.ayahs.map(ayah => ({
                            number: ayah.numberInSurah,
                            text: ayah.text,
                            page: ayah.page
                        }))
                    };
                    surahCache.set(currentSurahId, surahFull);
                } else throw new Error();
            } catch (err) {
                quranContentDiv.innerHTML = `<div style="color:#b66b2a;">⚠️ فشل تحميل السورة</div>`;
                return;
            }
        }
        surahData = surahFull;
        surahNameSpan.innerText = surahData.name;
        surahSubSpan.innerText = (currentSurahId === 1) ? "يُؤَكِّدُ النَّفْخَتَيْنِ!" : "بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ";

        pagesMap.clear();
        for (let ayah of surahData.ayahs) {
            const p = ayah.page;
            if (!pagesMap.has(p)) pagesMap.set(p, []);
            pagesMap.get(p).push(ayah);
        }
        availablePages = Array.from(pagesMap.keys()).sort((a,b) => a-b);
        if (availablePages.length === 0) {
            quranContentDiv.innerHTML = `<div>لا توجد صفحات</div>`;
            return;
        }
        if (!availablePages.includes(currentPage)) currentPage = availablePages[0];
        await renderCurrentPage();
    }

    async function renderCurrentPage() {
        if (!surahData || !pagesMap.has(currentPage)) return;
        const ayahs = pagesMap.get(currentPage);
        let html = '';
        for (let ayah of ayahs) {
            const cacheKey = `trans_${currentSurahId}_${ayah.number}`;
            let translationText = localStorage.getItem(cacheKey);
            if (!translationText) {
                translationText = await fetchTranslation(currentSurahId, ayah.number);
                if (translationText) localStorage.setItem(cacheKey, translationText);
                await new Promise(r => setTimeout(r, 25));
            }
            html += `
                <div class="aya-wrapper">
                    <div class="aya-line">
                        <span class="ayah-number">﴿${ayah.number}﴾</span>
                        <span class="aya-text">${ayah.text}</span>
                    </div>
                    ${translationText ? `<div class="translation-text">📖 ${translationText}</div>` : `<div class="translation-text" style="opacity:0.6;">🕋 ترجمة المعاني</div>`}
                </div>
            `;
        }
        quranContentDiv.innerHTML = html;
        pageNumberSpan.innerText = `الصفحة ${currentPage}`;
        const idx = availablePages.indexOf(currentPage);
        prevPageBtn.disabled = (idx <= 0);
        nextPageBtn.disabled = (idx >= availablePages.length - 1);
        updateFontSize();
        localStorage.setItem(`lastPage_surah_${currentSurahId}`, currentPage);
    }

    function goPrevPage() {
        const idx = availablePages.indexOf(currentPage);
        if (idx > 0) {
            currentPage = availablePages[idx - 1];
            renderCurrentPage();
        }
    }
    function goNextPage() {
        const idx = availablePages.indexOf(currentPage);
        if (idx < availablePages.length - 1) {
            currentPage = availablePages[idx + 1];
            renderCurrentPage();
        }
    }

    async function onSurahChange() {
        stopPageAudio(true);
        const newId = parseInt(surahSelect.value);
        if (isNaN(newId)) return;
        currentSurahId = newId;
        localStorage.setItem('lastSurahId', currentSurahId);
        const storedPage = localStorage.getItem(`lastPage_surah_${currentSurahId}`);
        currentPage = (storedPage && !isNaN(parseInt(storedPage))) ? parseInt(storedPage) : 1;
        await loadSurahAndPage();
    }

    async function loadSurahList() {
        try {
            const resp = await fetch('https://api.alquran.cloud/v1/surah');
            const data = await resp.json();
            if (data.code === 200 && data.data) {
                surahList = data.data;
                surahSelect.innerHTML = '';
                for (let surah of surahList) {
                    const option = document.createElement('option');
                    option.value = surah.number;
                    option.textContent = `${surah.number}. ${surah.name}`;
                    surahSelect.appendChild(option);
                }
                const lastSurah = localStorage.getItem('lastSurahId');
                let initSurah = 1;
                if (lastSurah && !isNaN(parseInt(lastSurah))) initSurah = parseInt(lastSurah);
                currentSurahId = initSurah;
                surahSelect.value = currentSurahId;
                const storedPage = localStorage.getItem(`lastPage_surah_${currentSurahId}`);
                currentPage = (storedPage && !isNaN(parseInt(storedPage))) ? parseInt(storedPage) : 1;
                await loadSurahAndPage();
            } else throw new Error();
        } catch (err) {
            surahSelect.innerHTML = '<option>خطأ</option>';
        }
    }

    // التحكم في حجم الخط
    function updateFontSize() {
        const texts = document.querySelectorAll('.aya-text');
        texts.forEach(t => t.style.fontSize = `${currentFontSize}rem`);
        const translations = document.querySelectorAll('.translation-text');
        translations.forEach(t => t.style.fontSize = `${Math.max(0.75, currentFontSize * 0.55)}rem`);
        localStorage.setItem('quranFontSize', currentFontSize);
    }
    function increaseFont() { if (currentFontSize + 0.1 <= MAX_FONT) { currentFontSize += 0.1; updateFontSize(); } }
    function decreaseFont() { if (currentFontSize - 0.1 >= MIN_FONT) { currentFontSize -= 0.1; updateFontSize(); } }

    // الوضع الليلي
    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
        const isDark = document.body.classList.contains('dark-mode');
        localStorage.setItem('darkMode', isDark);
        themeToggleBtn.innerHTML = isDark ? '<i class="fas fa-sun"></i> نهاري' : '<i class="fas fa-moon"></i> ليلي';
    }

    function loadSettings() {
        const savedFont = localStorage.getItem('quranFontSize');
        if (savedFont) {
            currentFontSize = parseFloat(savedFont);
            if (isNaN(currentFontSize)) currentFontSize = 1.55;
            currentFontSize = Math.min(MAX_FONT, Math.max(MIN_FONT, currentFontSize));
        }
        if (localStorage.getItem('darkMode') === 'true') {
            document.body.classList.add('dark-mode');
            themeToggleBtn.innerHTML = '<i class="fas fa-sun"></i> نهاري';
        }
        const savedSpeed = localStorage.getItem('playbackRate');
        if (savedSpeed) {
            const rate = parseFloat(savedSpeed);
            if (!isNaN(rate) && rate >= 0.5 && rate <= 2) setPlaybackRate(rate);
        }
        const savedReciter = localStorage.getItem('selectedReciter');
        if (savedReciter && reciterSelect.querySelector(`option[value="${savedReciter}"]`)) {
            currentReciter = savedReciter;
            reciterSelect.value = savedReciter;
        }
    }

    // أحداث المفاتيح
    document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowRight') { e.preventDefault(); goNextPage(); }
        else if (e.key === 'ArrowLeft') { e.preventDefault(); goPrevPage(); }
        else if (e.key === 'Escape') { stopPageAudio(true); audioStatusSpan.innerHTML = '⏹️ تم الإيقاف.'; }
    });

    function bindEvents() {
        surahSelect.addEventListener('change', onSurahChange);
        reciterSelect.addEventListener('change', (e) => {
            currentReciter = e.target.value;
            localStorage.setItem('selectedReciter', currentReciter);
            if (isPlayingPage) { stopPageAudio(true); audioStatusSpan.innerHTML = '🔄 تم تغيير القارئ. أعد الاستماع.'; }
        });
        prevPageBtn.addEventListener('click', goPrevPage);
        nextPageBtn.addEventListener('click', goNextPage);
        listenPageBtn.addEventListener('click', () => {
            if (!surahData) audioStatusSpan.innerHTML = '⚠️ انتظر تحميل الصفحة.';
            else startPagePlayback();
        });
        stopAudioBtn.addEventListener('click', () => { stopPageAudio(true); audioStatusSpan.innerHTML = '🛑 إيقاف التلاوة.'; });
        fontPlusBtn.addEventListener('click', increaseFont);
        fontMinusBtn.addEventListener('click', decreaseFont);
        themeToggleBtn.addEventListener('click', toggleDarkMode);
        document.querySelectorAll('.speed-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const rate = parseFloat(btn.getAttribute('data-speed'));
                if (!isNaN(rate)) setPlaybackRate(rate);
            });
        });
    }

    async function init() {
        loadSettings();
        bindEvents();
        await loadSurahList();
    }
    init();
</script>
</body>
</html>
