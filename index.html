<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>المصحف الذهبي | آيات منفصلة بمسافات</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tajawal', 'Amiri Quran', serif;
            background: #e8d9b0;
            color: #2b2b1f;
            transition: background 0.3s, color 0.2s;
            min-height: 100vh;
        }
        body.dark-mode {
            background: #1a2a1f;
            color: #e5d5b0;
        }
        body.dark-mode .quran-card {
            background: #2a3a2a;
            border: 1px solid #c9a45b;
        }
        body.dark-mode .controls-panel {
            background: #2a3a2a;
        }
        body.dark-mode button, body.dark-mode select {
            background: #3a4a2a;
            color: #f7e9cf;
            border-color: #c9a45b;
        }
        body.dark-mode .aya-item {
            background: #2a3a2a;
            border-bottom: 1px solid #c9a45b;
        }
        body.dark-mode .ayah-number {
            background: #c9a45b;
            color: #1a2a1f;
        }
        body.dark-mode .tafsir-popup {
            background: #2a3a2a;
            border-color: #c9a45b;
            color: #f0e6d2;
        }
        .app-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem 2rem;
        }
        .header {
            text-align: center;
            margin-bottom: 1.5rem;
            padding: 0.5rem 0;
            border-bottom: 2px solid #c9a45b;
        }
        .header h1 {
            font-size: 2rem;
            font-weight: 800;
            color: #7a5a2a;
        }
        body.dark-mode .header h1 {
            color: #e5b85a;
        }
        .controls-panel {
            background: #f4ecd8;
            border-radius: 60px;
            padding: 0.5rem 1.2rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.7rem;
            margin-bottom: 1.5rem;
            border: 1px solid #dccfaa;
        }
        .ctrl-btn, .ctrl-select {
            background: #fef8e7;
            border: 1px solid #d4bf8a;
            padding: 0.4rem 1rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #4a3a1a;
        }
        .ctrl-btn:hover {
            background: #e8dcc8;
            transform: translateY(-1px);
        }
        .ctrl-select { min-width: 180px; }
        .special-group, .speed-group {
            background: #e8ddc4;
            border-radius: 50px;
            padding: 0 0.4rem;
            display: flex;
            gap: 0.3rem;
        }
        .speed-btn {
            background: #fef8e7;
            border: none;
            padding: 0.2rem 0.6rem;
            border-radius: 30px;
            font-weight: bold;
            font-size: 0.75rem;
            cursor: pointer;
        }
        .speed-btn.active-speed {
            background: #c9a45b;
            color: white;
        }
        .quran-card {
            background: #fffef5;
            border-radius: 28px;
            padding: 1.5rem;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
            border: 1px solid #e2d5b6;
        }
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            border-bottom: 2px solid #dbba87;
            padding-bottom: 0.6rem;
            margin-bottom: 1.2rem;
        }
        .surah-title {
            font-size: 1.6rem;
            font-weight: bold;
            color: #8a6020;
        }
        .page-navi {
            display: flex;
            gap: 0.6rem;
            align-items: center;
        }
        .page-btn {
            background: #e8ddc4;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1rem;
        }
        .page-btn:hover:not(:disabled) {
            background: #c9a45b;
            color: white;
        }
        .page-info {
            background: #ede0ca;
            padding: 0.2rem 1rem;
            border-radius: 40px;
            font-size: 0.9rem;
        }
        .page-audio-bar {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }
        .listen-page-btn, .tafsir-page-btn, .stop-page-btn {
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-weight: bold;
            font-size: 0.85rem;
            cursor: pointer;
            color: white;
        }
        .listen-page-btn { background: linear-gradient(95deg, #2f6b47, #1f8a5c); }
        .tafsir-page-btn { background: linear-gradient(95deg, #8e6b2c, #b8963a); }
        .stop-page-btn { background: linear-gradient(95deg, #9b4b2c, #b95c32); }
        .status-msg {
            font-size: 0.85rem;
            margin: 0.5rem 0;
            color: #c97e2a;
            text-align: center;
        }

        /* --- تنسيق الآيات: كل آية في سطر منفصل مع مسافة بينها --- */
        .scrollable-content {
            max-height: 65vh;
            overflow-y: auto;
            padding-left: 5px;
        }
        .aya-item {
            display: block;
            margin-bottom: 1.2rem;      /* مسافة بين الآيات */
            padding: 0.2rem 0;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            line-height: 1.6;
        }
        .aya-text {
            font-family: 'Amiri Quran', 'Tajawal', serif;
            font-size: 1.35rem;
            text-align: justify;
            direction: rtl;
        }
        .ayah-number {
            display: inline-block;
            font-size: 0.9rem;
            background: #e8d8b8;
            color: #4a3a1a;
            border-radius: 30px;
            padding: 0 6px;
            margin-left: 6px;
            font-weight: bold;
            vertical-align: middle;
        }
        /* تخصيص شريط التمرير */
        .scrollable-content::-webkit-scrollbar {
            width: 6px;
        }
        .scrollable-content::-webkit-scrollbar-track {
            background: #ede0ca;
            border-radius: 10px;
        }
        .scrollable-content::-webkit-scrollbar-thumb {
            background: #c9a45b;
            border-radius: 10px;
        }

        /* نافذة التفسير */
        .tafsir-popup {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            max-width: 550px;
            background: #fffef7;
            border-radius: 24px;
            padding: 1rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            z-index: 1000;
            border-right: 5px solid #c9a45b;
            font-size: 0.85rem;
            max-height: 65vh;
            overflow-y: auto;
            direction: rtl;
        }
        .tafsir-popup h4 {
            color: #b87c2e;
            margin-bottom: 0.5rem;
            font-size: 1rem;
            border-bottom: 1px solid #e0c48b;
            padding-bottom: 0.3rem;
        }
        .close-tafsir {
            float: left;
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: #b87c2e;
        }
        .footer-note {
            text-align: center;
            margin-top: 1.2rem;
            font-size: 0.7rem;
            opacity: 0.8;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        @media (max-width: 700px) {
            .app-container { padding: 0.5rem; }
            .aya-text { font-size: 1rem; }
            .ayah-number { font-size: 0.7rem; }
            .aya-item { margin-bottom: 0.8rem; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <h1><i class="fas fa-book-quran"></i> المصحف الذهبي</h1>
        <p style="font-size:0.8rem;">كل آية في سطر منفصل | أرقام الآيات ﴿﴾ | استماع الصفحة | تفسير الصفحة</p>
    </div>

    <div class="controls-panel">
        <select id="surah-select" class="ctrl-select"><option>تحميل السور...</option></select>
        <select id="reciter-select" class="ctrl-select">
            <option value="Alafasy_128kbps">🎙️ مشاري راشد العفاسي</option>
            <option value="Abdul_Basit_Mujawwad_128kbps">🎙️ عبد الباسط عبد الصمد</option>
            <option value="Husary_128kbps">🎙️ محمود خليل الحصري</option>
            <option value="Maher_AlMuaiqly_128kbps">🎙️ ماهر المعيقلي</option>
            <option value="Shuraym_128kbps">🎙️ سعود الشريم</option>
            <option value="Sudais_128kbps">🎙️ عبد الرحمن السديس</option>
            <option value="Ahmed_ibn_Ali_al-Ajamy_128kbps">🎙️ أحمد العجمي</option>
            <option value="Yasser_Ad-Dussary_128kbps">🎙️ ياسر الدوسري</option>
        </select>
        <div class="special-group">
            <button id="font-plus" class="ctrl-btn"><i class="fas fa-plus-circle"></i> تكبير</button>
            <button id="font-minus" class="ctrl-btn"><i class="fas fa-minus-circle"></i> تصغير</button>
        </div>
        <div class="speed-group">
            <button data-speed="0.5" class="speed-btn">0.5x</button>
            <button data-speed="0.75" class="speed-btn">0.75x</button>
            <button data-speed="1" class="speed-btn active-speed">1x</button>
            <button data-speed="1.25" class="speed-btn">1.25x</button>
            <button data-speed="1.5" class="speed-btn">1.5x</button>
            <button data-speed="2" class="speed-btn">2x</button>
        </div>
        <button id="theme-toggle" class="ctrl-btn"><i class="fas fa-moon"></i> ليلي</button>
    </div>

    <div class="quran-card">
        <div class="page-header">
            <div class="surah-title" id="surah-name">سورة الفاتحة</div>
            <div class="page-navi">
                <button id="prev-page-btn" class="page-btn"><i class="fas fa-chevron-right"></i></button>
                <span id="page-counter" class="page-info">الصفحة 1</span>
                <button id="next-page-btn" class="page-btn"><i class="fas fa-chevron-left"></i></button>
            </div>
        </div>
        <div class="page-audio-bar">
            <button id="listenFullPageBtn" class="listen-page-btn"><i class="fas fa-headphones"></i> 🎧 استماع الصفحة</button>
            <button id="tafsirPageBtn" class="tafsir-page-btn"><i class="fas fa-book-open"></i> 📖 تفسير الصفحة</button>
            <button id="stopPageAudioBtn" class="stop-page-btn"><i class="fas fa-stop-circle"></i> إيقاف</button>
        </div>
        <div id="audioStatus" class="status-msg"></div>
        <div id="quran-content"><div class="loader" style="text-align:center; padding:2rem;"><i class="fas fa-spinner fa-pulse"></i> جلب آيات الصفحة...</div></div>
    </div>
    <div class="footer-note">
        <i class="fas fa-volume-up"></i> اختر القارئ ثم اضغط "استماع الصفحة" | اضغط "تفسير الصفحة" لترجمة المعاني
    </div>
</div>

<script>
    // --------------------- المتغيرات العامة ---------------------
    let currentSurahId = 1;
    let currentPage = 1;
    let surahData = null;
    let pagesMap = new Map();
    let availablePages = [];

    let currentAudioQueue = [];
    let isPlayingPage = false;
    let currentAudioIndex = 0;
    let currentAudioElement = null;
    let currentPlaybackRate = 1.0;
    let currentReciter = "Alafasy_128kbps";

    let currentFontSize = 1.35;
    const MIN_FONT = 0.9, MAX_FONT = 2.2;
    const surahCache = new Map();
    let surahList = [];
    let currentTafsirPopup = null;

    // عناصر DOM
    const surahSelect = document.getElementById('surah-select');
    const reciterSelect = document.getElementById('reciter-select');
    const surahNameSpan = document.getElementById('surah-name');
    const quranContentDiv = document.getElementById('quran-content');
    const prevPageBtn = document.getElementById('prev-page-btn');
    const nextPageBtn = document.getElementById('next-page-btn');
    const pageCounterSpan = document.getElementById('page-counter');
    const listenFullPageBtn = document.getElementById('listenFullPageBtn');
    const stopPageAudioBtn = document.getElementById('stopPageAudioBtn');
    const tafsirPageBtn = document.getElementById('tafsirPageBtn');
    const audioStatusSpan = document.getElementById('audioStatus');
    const themeToggle = document.getElementById('theme-toggle');
    const fontPlus = document.getElementById('font-plus');
    const fontMinus = document.getElementById('font-minus');

    // روابط الصوت
    function getAyahAudioUrl(reciterCode, surahId, ayahNumber) {
        const surahPadded = String(surahId).padStart(3, '0');
        const ayahPadded = String(ayahNumber).padStart(3, '0');
        return `https://everyayah.com/data/${reciterCode}/${surahPadded}${ayahPadded}.mp3`;
    }

    // دوال الصوت
    function stopPageAudio(resetQueue = true) {
        if (currentAudioElement) {
            currentAudioElement.pause();
            currentAudioElement.currentTime = 0;
            currentAudioElement = null;
        }
        if (resetQueue) {
            isPlayingPage = false;
            currentAudioIndex = 0;
            currentAudioQueue = [];
        } else isPlayingPage = false;
    }

    function playNextAyahInQueue() {
        if (!isPlayingPage) return;
        if (currentAudioIndex >= currentAudioQueue.length) {
            isPlayingPage = false;
            audioStatusSpan.innerHTML = '✅ انتهت تلاوة هذه الصفحة. جزاك الله خيراً.';
            currentAudioElement = null;
            return;
        }
        const ayahObj = currentAudioQueue[currentAudioIndex];
        audioStatusSpan.innerHTML = `🔊 جاري تلاوة الآية ${ayahObj.ayahNumber} من ${currentAudioQueue.length} (السرعة: ${currentPlaybackRate}x)`;
        const audioUrl = getAyahAudioUrl(currentReciter, ayahObj.surahId, ayahObj.ayahNumber);
        const audio = new Audio(audioUrl);
        currentAudioElement = audio;
        audio.playbackRate = currentPlaybackRate;
        audio.play().catch(() => {
            currentAudioIndex++;
            playNextAyahInQueue();
        });
        audio.onended = () => {
            currentAudioIndex++;
            playNextAyahInQueue();
        };
        audio.onerror = () => {
            currentAudioIndex++;
            playNextAyahInQueue();
        };
    }

    function startPagePlayback() {
        if (!surahData || !pagesMap.has(currentPage)) {
            audioStatusSpan.innerHTML = '❌ لا توجد آيات في هذه الصفحة.';
            return;
        }
        stopPageAudio(true);
        const ayahsOfPage = pagesMap.get(currentPage);
        if (!ayahsOfPage.length) return;
        currentAudioQueue = ayahsOfPage.map(ayah => ({
            surahId: currentSurahId,
            ayahNumber: ayah.number
        }));
        currentAudioIndex = 0;
        isPlayingPage = true;
        playNextAyahInQueue();
    }

    function setPlaybackRate(rate) {
        currentPlaybackRate = rate;
        if (currentAudioElement && !currentAudioElement.paused) currentAudioElement.playbackRate = rate;
        document.querySelectorAll('.speed-btn').forEach(btn => {
            const spd = parseFloat(btn.getAttribute('data-speed'));
            if (Math.abs(spd - rate) < 0.01) btn.classList.add('active-speed');
            else btn.classList.remove('active-speed');
        });
    }

    // تفسير الصفحة
    async function showPageTafsir() {
        if (!surahData || !pagesMap.has(currentPage)) {
            audioStatusSpan.innerHTML = '❌ لا توجد آيات للتفسير.';
            return;
        }
        if (currentTafsirPopup) currentTafsirPopup.remove();
        const ayahs = pagesMap.get(currentPage);
        audioStatusSpan.innerHTML = `📖 جلب تفسير الصفحة ${currentPage}...`;
        try {
            let tafsirHtml = `<div style="margin-bottom:8px;"><strong>سورة ${surahData.name}</strong> | الصفحة ${currentPage}</div>`;
            for (let ayah of ayahs) {
                const response = await fetch(`https://api.alquran.cloud/v1/ayah/${currentSurahId}:${ayah.number}/editions/quran-uthmani,ar.alafasy`);
                const data = await response.json();
                if (data.code === 200 && data.data && data.data.length >= 2) {
                    tafsirHtml += `
                        <div style="margin-bottom:1rem; border-bottom:1px solid #ddd; padding-bottom:0.6rem;">
                            <div style="font-weight:bold; color:#b87c2e;">الآية ${ayah.number}</div>
                            <div style="font-size:0.95rem; margin:4px 0;">${data.data[0].text}</div>
                            <div style="font-size:0.85rem; background:rgba(0,0,0,0.03); padding:5px; border-radius:12px;">📖 ${data.data[1].text}</div>
                        </div>
                    `;
                } else {
                    tafsirHtml += `<div>⚠️ لم نتمكن من جلب ترجمة الآية ${ayah.number}</div>`;
                }
                await new Promise(r => setTimeout(r, 80));
            }
            const popup = document.createElement('div');
            popup.className = 'tafsir-popup';
            popup.innerHTML = `
                <button class="close-tafsir"><i class="fas fa-times"></i></button>
                <h4>📖 تفسير الصفحة ${currentPage} (ترجمة المعاني)</h4>
                <div style="max-height:55vh; overflow-y:auto;">${tafsirHtml}</div>
                <div style="font-size:0.7rem; margin-top:8px;">✍️ ترجمة معاني الآيات من API القرآن</div>
            `;
            document.body.appendChild(popup);
            currentTafsirPopup = popup;
            popup.querySelector('.close-tafsir').onclick = () => { popup.remove(); currentTafsirPopup = null; };
            audioStatusSpan.innerHTML = '';
        } catch (err) {
            audioStatusSpan.innerHTML = '⚠️ حدث خطأ في جلب التفسير.';
        }
    }

    // تحميل وعرض الصفحة (كل آية في عنصر منفصل)
    async function loadSurahAndPage() {
        if (!currentSurahId) return;
        quranContentDiv.innerHTML = `<div class="loader" style="text-align:center; padding:2rem;">جاري التحميل...</div>`;
        stopPageAudio(true);

        let surahFull = surahCache.get(currentSurahId);
        if (!surahFull) {
            try {
                const response = await fetch(`https://api.alquran.cloud/v1/surah/${currentSurahId}/editions/quran-uthmani`);
                const data = await response.json();
                if (data.code === 200 && data.data && data.data[0]) {
                    const edition = data.data[0];
                    surahFull = {
                        name: edition.name,
                        englishName: edition.englishName,
                        ayahs: edition.ayahs.map(ayah => ({
                            number: ayah.numberInSurah,
                            text: ayah.text,
                            page: ayah.page
                        }))
                    };
                    surahCache.set(currentSurahId, surahFull);
                } else throw new Error();
            } catch (err) {
                quranContentDiv.innerHTML = `<div class="loader" style="color:red;">⚠️ خطأ في تحميل السورة</div>`;
                return;
            }
        }
        surahData = surahFull;
        surahNameSpan.innerText = `${surahData.name}`;

        pagesMap.clear();
        for (let ayah of surahData.ayahs) {
            const p = ayah.page;
            if (!pagesMap.has(p)) pagesMap.set(p, []);
            pagesMap.get(p).push(ayah);
        }
        availablePages = Array.from(pagesMap.keys()).sort((a, b) => a - b);
        if (availablePages.length === 0) {
            quranContentDiv.innerHTML = `<div class="loader">لا توجد آيات</div>`;
            return;
        }
        if (!availablePages.includes(currentPage)) currentPage = availablePages[0];
        renderCurrentPage();
    }

    function renderCurrentPage() {
        if (!surahData || !pagesMap.has(currentPage)) return;
        const ayahs = pagesMap.get(currentPage);
        let html = `<div class="scrollable-content">`;
        for (let ayah of ayahs) {
            html += `
                <div class="aya-item">
                    <div class="aya-text">
                        <span class="ayah-number">﴿${ayah.number}﴾</span>
                        ${ayah.text}
                    </div>
                </div>
            `;
        }
        html += `</div>`;
        quranContentDiv.innerHTML = html;
        pageCounterSpan.innerText = `الصفحة ${currentPage}`;

        const idx = availablePages.indexOf(currentPage);
        prevPageBtn.disabled = (idx <= 0);
        nextPageBtn.disabled = (idx >= availablePages.length - 1);

        updateFontSize();
        localStorage.setItem(`lastPage_surah_${currentSurahId}`, currentPage);
    }

    function goPrevPage() {
        const idx = availablePages.indexOf(currentPage);
        if (idx > 0) { currentPage = availablePages[idx - 1]; loadSurahAndPage(); }
    }
    function goNextPage() {
        const idx = availablePages.indexOf(currentPage);
        if (idx < availablePages.length - 1) { currentPage = availablePages[idx + 1]; loadSurahAndPage(); }
    }
    async function onSurahChange() {
        stopPageAudio(true);
        const newId = parseInt(surahSelect.value);
        if (isNaN(newId)) return;
        currentSurahId = newId;
        localStorage.setItem('lastSurahId', currentSurahId);
        const storedPage = localStorage.getItem(`lastPage_surah_${currentSurahId}`);
        currentPage = (storedPage && !isNaN(parseInt(storedPage))) ? parseInt(storedPage) : 1;
        await loadSurahAndPage();
    }

    async function loadSurahList() {
        try {
            const resp = await fetch('https://api.alquran.cloud/v1/surah');
            const data = await resp.json();
            if (data.code === 200 && data.data) {
                surahList = data.data;
                surahSelect.innerHTML = '';
                for (let surah of surahList) {
                    const option = document.createElement('option');
                    option.value = surah.number;
                    option.textContent = `${surah.number}. ${surah.name}`;
                    surahSelect.appendChild(option);
                }
                const lastSurah = localStorage.getItem('lastSurahId');
                let initSurah = 1;
                if (lastSurah && !isNaN(parseInt(lastSurah))) initSurah = parseInt(lastSurah);
                currentSurahId = initSurah;
                surahSelect.value = currentSurahId;
                const storedPage = localStorage.getItem(`lastPage_surah_${currentSurahId}`);
                currentPage = (storedPage && !isNaN(parseInt(storedPage))) ? parseInt(storedPage) : 1;
                await loadSurahAndPage();
            } else throw new Error();
        } catch (err) {
            surahSelect.innerHTML = '<option>حدث خطأ</option>';
        }
    }

    function updateFontSize() {
        const texts = document.querySelectorAll('.aya-text');
        texts.forEach(t => t.style.fontSize = `${currentFontSize}rem`);
    }
    function increaseFont() {
        if (currentFontSize + 0.1 <= MAX_FONT) {
            currentFontSize += 0.1;
            updateFontSize();
            localStorage.setItem('quranFontSize', currentFontSize);
        }
    }
    function decreaseFont() {
        if (currentFontSize - 0.1 >= MIN_FONT) {
            currentFontSize -= 0.1;
            updateFontSize();
            localStorage.setItem('quranFontSize', currentFontSize);
        }
    }
    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
        const isDark = document.body.classList.contains('dark-mode');
        localStorage.setItem('darkMode', isDark);
        themeToggle.innerHTML = isDark ? '<i class="fas fa-sun"></i> نهار' : '<i class="fas fa-moon"></i> ليلي';
    }
    function loadSettings() {
        const savedFont = localStorage.getItem('quranFontSize');
        if (savedFont) {
            currentFontSize = parseFloat(savedFont);
            if (isNaN(currentFontSize)) currentFontSize = 1.35;
            currentFontSize = Math.min(MAX_FONT, Math.max(MIN_FONT, currentFontSize));
        }
        if (localStorage.getItem('darkMode') === 'true') {
            document.body.classList.add('dark-mode');
            themeToggle.innerHTML = '<i class="fas fa-sun"></i> نهار';
        }
        const savedSpeed = localStorage.getItem('playbackRate');
        if (savedSpeed) {
            const rate = parseFloat(savedSpeed);
            if (!isNaN(rate) && rate >= 0.5 && rate <= 2) setPlaybackRate(rate);
        }
        const savedReciter = localStorage.getItem('selectedReciter');
        if (savedReciter && reciterSelect.querySelector(`option[value="${savedReciter}"]`)) {
            currentReciter = savedReciter;
            reciterSelect.value = savedReciter;
        }
    }

    document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowRight') { e.preventDefault(); goNextPage(); }
        else if (e.key === 'ArrowLeft') { e.preventDefault(); goPrevPage(); }
        else if (e.key === 'Escape') { stopPageAudio(true); audioStatusSpan.innerHTML = '⏹️ تم الإيقاف.'; if (currentTafsirPopup) currentTafsirPopup.remove(); }
    });

    function bindEvents() {
        surahSelect.addEventListener('change', onSurahChange);
        reciterSelect.addEventListener('change', (e) => {
            currentReciter = e.target.value;
            localStorage.setItem('selectedReciter', currentReciter);
            if (isPlayingPage) { stopPageAudio(true); audioStatusSpan.innerHTML = '🔄 تم تغيير القارئ. اضغط "استماع الصفحة" مرة أخرى.'; }
        });
        prevPageBtn.addEventListener('click', goPrevPage);
        nextPageBtn.addEventListener('click', goNextPage);
        listenFullPageBtn.addEventListener('click', () => {
            if (!surahData) audioStatusSpan.innerHTML = '⚠️ انتظر تحميل الصفحة أولاً.';
            else startPagePlayback();
        });
        stopPageAudioBtn.addEventListener('click', () => { stopPageAudio(true); audioStatusSpan.innerHTML = '🛑 تم إيقاف التلاوة.'; });
        tafsirPageBtn.addEventListener('click', () => {
            if (!surahData) audioStatusSpan.innerHTML = '⚠️ انتظر تحميل الصفحة أولاً.';
            else showPageTafsir();
        });
        fontPlus.addEventListener('click', increaseFont);
        fontMinus.addEventListener('click', decreaseFont);
        themeToggle.addEventListener('click', toggleDarkMode);
        document.querySelectorAll('.speed-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const rate = parseFloat(btn.getAttribute('data-speed'));
                if (!isNaN(rate)) { setPlaybackRate(rate); localStorage.setItem('playbackRate', rate); }
            });
        });
    }

    async function init() {
        loadSettings();
        bindEvents();
        await loadSurahList();
    }
    init();
</script>
</body>
</html>
